<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR I miss U - Stable & Interactive</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        /* 隱藏 A-Frame 預設的 VR 按鈕 */
        .a-enter-vr {
            display: none;
        }
    </style>

    <script>
        // 註冊一個自訂組件，用來處理點擊事件
        AFRAME.registerComponent('clickable-url', {
            schema: {
                url: {type: 'string'}
            },
            init: function () {
                const el = this.el;
                const url = this.data.url;

                // 監聽點擊事件
                el.addEventListener('click', function () {
                    // 在新視窗中打開網址
                    window.open(url, '_blank');
                });
            }
        });
    </script>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./1.mind; missInterval: 1000; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-cursor raycaster="objects: .clickable" fuse="false"></a-cursor>
        </a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-text 
                id="imissu-text"
                class="clickable"
                clickable-url="url: https://www.xiaohongshu.com/user/profile/61c2f91d000000001000fd66?xsec_token=AB3bAk7H6mRvb92kJMgvc7FXIzjUrNQcTUXdtqF53OC0Q%3D&xsec_source=pc_search"
                value="I miss U" 
                font="mozillavr"
                color="#FF4081" 
                align="center" 
                width="4" 
                position="0 0 0.2"
                animation="property: position; to: 0 0.1 0.2; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
            </a-text>

            <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
            <a-light type="directional" position="0 1 1" intensity="0.5"></a-light>

        </a-entity>
    </a-scene>

</body>
</html>
