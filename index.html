<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000;
        }
        #start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 10px;">MindAR 互動體驗</h2>
        <p style="margin-bottom: 25px; color: #ccc; font-size: 14px;">請點擊下方按鈕以允許開啟鏡頭與音訊</p>
        <button id="start-btn">開啟 AR 體驗</button>
    </div>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./targets.mind;
                      autoStart: false;
                      filterMinCF: 0.001;
                      filterBeta: 0.01;
                      missTolerance: 10;
                      warmupTolerance: 10"
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets timeout="10000">
            <!-- 垂直视频：去掉 muted，保留 playsinline 供 iOS 内嵌播放 -->
            <video id="mp4Video" 
                   src="./1.mp4" 
                   loop="true"
                   playsinline 
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
        <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <!-- 
                垂直视频宽高比 9:16 → height = width × (16/9) = 1 × 1.7778
                如果你的视频是其他比例（如 3:4），请相应调整 height
                例如 3:4 → height = 1 × (4/3) = 1.3333
            -->
            <a-video 
                src="#mp4Video" 
                width="1" 
                height="1.7778"
                position="0 0 0" 
                rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        AFRAME.registerComponent('video-controller', {
            init: function () {
                const el = this.el;
                const video = document.querySelector('#mp4Video');

                el.addEventListener('targetFound', function () {
                    console.log("辨識成功，播放影片");
                    // 恢复 AudioContext（部分浏览器在页面切换后会挂起）
                    if (window._audioCtx && window._audioCtx.state === 'suspended') {
                        window._audioCtx.resume();
                    }
                    video.play().catch(err => console.log("播放被拦截:", err));
                });

                el.addEventListener('targetLost', function () {
                    console.log("目標丟失，暫停影片");
                    video.pause();
                });
            }
        });

        const sceneEl = document.querySelector('#ar-scene');
        const video = document.querySelector('#mp4Video');
        const startBtn = document.querySelector('#start-btn');
        const startOverlay = document.querySelector('#start-overlay');

        let sceneReady = false;
        sceneEl.addEventListener('loaded', function () {
            sceneReady = true;
            console.log("场景已加载完成");
        });

        startBtn.addEventListener('click', function () {
            // 关键：在用户手势内解锁 AudioContext，确保有声音
            try {
                window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window._audioCtx.resume();
            } catch(e) {
                console.log("AudioContext 初始化失败:", e);
            }

            // 在用户手势内激活视频（不静音）
            video.muted = false;
            video.play().then(() => {
                video.pause();
                video.currentTime = 0;
            }).catch(err => {
                console.log("视频激活失败，尝试静音激活:", err);
                // 降级方案：先静音激活，识别到目标时再取消静音
                video.muted = true;
                video.play().then(() => {
                    video.pause();
                    video.currentTime = 0;
                }).catch(e => console.log("静音激活也失败:", e));
            });

            startOverlay.classList.add('hidden');

            const tryStart = () => {
                const mindARSystem = sceneEl.systems["mindar-image-system"];
                if (mindARSystem) {
                    mindARSystem.start();
                } else {
                    console.warn("MindAR system 未就绪，重试中...");
                    setTimeout(tryStart, 300);
                }
            };

            if (sceneReady) {
                tryStart();
            } else {
                sceneEl.addEventListener('loaded', tryStart, { once: true });
            }
        });

        // 微信：在 WeixinJSBridgeReady 里也解锁音频
        document.addEventListener("WeixinJSBridgeReady", function () {
            try {
                window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window._audioCtx.resume();
            } catch(e) {}
            video.muted = false;
            video.play().then(() => { video.pause(); }).catch(e => console.log(e));
        }, false);
    </script>
</body>
</html>
