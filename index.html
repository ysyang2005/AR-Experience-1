<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>釉中之秘：瓷藝迷蹤 - 交互解密測試版</title>
    <style>
        :root {
            --bg-color: #1a1612;
            --panel-bg: #2c2219;
            --text-color: #e8d8c8;
            --accent-color: #d4a373;
            --orange-ceramic: #e76f51;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .guide-box {
            background: #3d3025;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
            max-width: 800px;
        }

        /* 遊戲主舞台 */
        .game-stage {
            display: flex;
            width: 1000px;
            height: 550px;
            background: var(--panel-bg);
            border: 3px solid var(--accent-color);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 面板通用樣式 */
        .panel {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #4a3b2c;
            position: relative;
        }

        .panel:last-child {
            border-right: none;
        }

        h3 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 1px solid #4a3b2c;
            padding-bottom: 5px;
        }

        /* 左側：材料書 */
        .layer-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .layer-btn {
            background: #3d3025;
            color: var(--text-color);
            border: 1px solid #5c4737;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
        }

        .layer-btn:hover {
            background: #4a3b2c;
            border-color: var(--accent-color);
        }

        .layer-btn.active {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
        }

        /* 中央：耳環展示區 */
        #center-panel {
            flex: 1.2;
            justify-content: center;
            align-items: center;
            background: #1e1914;
        }

        .earring-container {
            position: relative;
            width: 200px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 模擬圖中的橙色耳環 */
        .ceramic-earring {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ff9e79, var(--orange-ceramic) 60%, #8b2611);
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.6);
            position: relative;
            cursor: pointer;
        }

        /* 耳環上方的金屬鉤 */
        .ceramic-earring::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 35px;
            width: 10px;
            height: 40px;
            border: 3px solid #d4af37;
            border-bottom: none;
            border-right: none;
            border-top-left-radius: 10px;
        }

        /* 微觀隱藏的鳳凰印記 (放大鏡下才看得到) */
        .hidden-mark {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            color: #fff;
        }

        /* 放大鏡工具 */
        .lens-tool {
            width: 70px;
            height: 70px;
            border: 4px solid #d4af37;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(0px);
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #fff;
            user-select: none;
            z-index: 10;
        }

        .lens-tool::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: -15px;
            width: 6px;
            height: 25px;
            background: #d4af37;
            transform: rotate(-45deg);
        }

        /* 右側：地圖與羅盤 */
        .map-box {
            width: 100%;
            height: 180px;
            background: #ebdcb9;
            border: 2px solid #8b7355;
            border-radius: 5px;
            margin-top: 10px;
            position: relative;
            color: #333;
            overflow: hidden;
        }

        .map-bg {
            width: 100%;
            height: 100%;
            opacity: 0.7;
            background: radial-gradient(#cda873 10%, transparent 11%), radial-gradient(#cda873 10%, transparent 11%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .secret-location {
            position: absolute;
            top: 40px;
            left: 180px;
            background: red;
            color: white;
            padding: 3px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            display: none;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .compass-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .compass {
            width: 100px;
            height: 100px;
            border: 4px solid var(--accent-color);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease;
            background: #221a13;
        }

        .compass-pointer {
            width: 6px;
            height: 80px;
            background: linear-gradient(to bottom, red 50%, #fff 50%);
            position: absolute;
            top: 10px;
            left: 47px;
            border-radius: 3px;
        }

        .compass-labels {
            position: absolute;
            width: 100%;
            height: 100%;
            font-size: 12px;
            font-weight: bold;
        }
        .label-n { position: absolute; top: 2px; left: 45px; color: red; }
        .label-e { position: absolute; top: 42px; right: 5px; }
        .label-s { position: absolute; bottom: 2px; left: 46px; }
        .label-w { position: absolute; top: 42px; left: 5px; }

        /* 底部對話/日誌欄 */
        .dialog-box {
            width: 1000px;
            background: #221a13;
            border: 2px solid var(--accent-color);
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 15px;
            box-sizing: border-box;
            min-height: 80px;
        }

        .dialog-text {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
        }

        .success-banner {
            display: none;
            background: #2a9d8f;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            width: 970px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>《釉中之秘：瓷藝迷蹤》- 互動工作檯</h1>
    
    <div class="guide-box">
        <p style="margin: 0;"><strong>【當前任務】</strong>：<br>
        1. 在左側點擊選擇<strong>「第三層：鳳凰釉」</strong>。<br>
        2. 拖曳中央右上角的<strong>金金色放大鏡</strong>到橙色耳環上，尋找隱藏的鳳凰印記。<br>
        3. 根據印記提示的朝向（東北方），點擊<strong>右側羅盤</strong>將指針轉向東北方（NE），解鎖地圖暗道。</p>
    </div>

    <div class="game-stage">
        
        <div class="panel" id="left-panel">
            <h3>📖 陶瓷材料結構書</h3>
            <p style="font-size: 13px; color:#aaa;">請選擇要分析的結構層：</p>
            <div class="layer-list">
                <button class="layer-btn" onclick="selectLayer(this, 5)">第五層：保護外釉 (Outer)</button>
                <button class="layer-btn" id="target-layer-btn" onclick="selectLayer(this, 4)">第四層：鳳凰密釉 (Hidden)</button>
                <button class="layer-btn" onclick="selectLayer(this, 3)">第三層：基礎內釉 (Inner)</button>
                <button class="layer-btn" onclick="selectLayer(this, 2)">第二層：化妝土層 (Engobe)</button>
                <button class="layer-btn" onclick="selectLayer(this, 1)">第一層：高嶺土胎骨 (Body)</button>
            </div>
            <p id="layer-desc" style="margin-top: 15px; font-size: 14px; color: var(--accent-color);"></p>
        </div>

        <div class="panel" id="center-panel">
            <div class="earring-container" id="earring-area">
                <div class="ceramic-earring" id="earring">
                    <div class="hidden-mark" id="phoenix-mark">🦅<span style="font-size: 10px;display: block;">NE</span></div>
                </div>
            </div>
            <div class="lens-tool" id="magnifier">放大鏡</div>
        </div>

        <div class="panel" id="right-panel">
            <h3>🗺️ 古窯殘圖</h3>
            <div class="map-box">
                <div class="map-bg"></div>
                <div style="position: absolute; top:20px; left:20px; font-weight: bold;">景德鎮古窯區</div>
                <div class="secret-location" id="secret-poi">📍 御窯廠暗道(解鎖!)</div>
            </div>

            <div class="compass-container">
                <h3>🧭 航海羅盤</h3>
                <div class="compass" id="compass" onclick="rotateCompass()">
                    <div class="compass-labels">
                        <span class="label-n">N</span>
                        <span class="label-e">E</span>
                        <span class="label-s">S</span>
                        <span class="label-w">W</span>
                    </div>
                    <div class="compass-pointer"></div>
                </div>
                <p style="font-size: 12px; color: #aaa; margin-top: 5px;">（點擊羅盤旋轉方向）</p>
            </div>
        </div>

    </div>

    <div class="dialog-box">
        <p class="dialog-text" id="dialog-p">【林言】：這對橙色耳環非常神祕，我需要利用桌上的工具，解開爺爺留在這上面的線索……</p>
    </div>

    <div class="success-banner" id="win-banner">
        🎉 序幕通關！成功鎖定「御窯廠暗道」，準備前往景德鎮！
    </div>

    <script>
        // 遊戲狀態變數
        let isLayerSelected = false;
        let isMarkRevealed = false;
        let compassAngle = 0;
        let isCompassCorrect = false;

        const dialog = document.getElementById('dialog-p');

        // 1. 左側：選擇釉層
        function selectLayer(btn, layerNum) {
            // 清除其他按鈕的選取狀態
            document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const desc = document.getElementById('layer-desc');
            if (layerNum === 4) {
                isLayerSelected = true;
                desc.innerText = "系統提示：探測到異常波長！這一層釉料含有未知微量元素，請用放大鏡深入觀察。";
                dialog.innerText = "【林言】：「第四層的密度不對勁……這裡面好像封存了什麼東西。我得用放大鏡仔細看看。」";
            } else {
                isLayerSelected = false;
                desc.innerText = "系統提示：結構正常，無特殊線索。";
                dialog.innerText = "【林言】：「這一層看起來只是普通的古代工藝，秘密不外乎在這裡。」";
                document.getElementById('phoenix-mark').style.opacity = 0;
            }
            checkGameStatus();
        }

        // 2. 中央：放大鏡拖曳邏輯 (滑鼠與觸控支援)
        const magnifier = document.getElementById('magnifier');
        const earring = document.getElementById('earring');
        const phoenixMark = document.getElementById('phoenix-mark');

        let isDragging = false;
        let offsetX, offsetY;

        magnifier.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', stopDrag);

        // 觸控支援
        magnifier.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
        window.addEventListener('touchmove', (e) => drag(e.touches[0]));
        window.addEventListener('touchend', stopDrag);

        function startDrag(e) {
            isDragging = true;
            magnifier.style.cursor = 'grabbing';
            const rect = magnifier.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
        }

        function drag(e) {
            if (!isDragging) return;
            
            const stage = document.querySelector('.game-stage');
            const stageRect = stage.getBoundingClientRect();
            
            // 計算新位置（相對於網頁）
            let x = e.clientX - stageRect.left - offsetX;
            let y = e.clientY - stageRect.top - offsetY;

            // 限制在舞台範圍內
            x = Math.max(0, Math.min(x, stageRect.width - 70));
            y = Math.max(0, Math.min(y, stageRect.height - 70));

            magnifier.style.left = x + 'px';
            magnifier.style.top = y + 'px';

            // 檢測放大鏡是否碰撞到耳環
            checkCollision();
        }

        function stopDrag() {
            isDragging = false;
            magnifier.style.cursor = 'grab';
        }

        function checkCollision() {
            if (!isLayerSelected) return;

            const magRect = magnifier.getBoundingClientRect();
            const earRect = earring.getBoundingClientRect();

            // 簡單的圓心距離碰撞檢測
            const magCenterX = magRect.left + magRect.width / 2;
            const magCenterY = magRect.top + magRect.height / 2;
            const earCenterX = earRect.left + earRect.width / 2;
            const earCenterY = earRect.top + earRect.height / 2;

            const distance = Math.sqrt(Math.pow(magCenterX - earCenterX, 2) + Math.pow(magCenterY - earCenterY, 2));

            // 當放大鏡中心接近耳環中心時
            if (distance < 50) {
                phoenixMark.style.opacity = 1;
                if (!isMarkRevealed) {
                    isMarkRevealed = true;
                    dialog.innerText = "【林言】：「天哪！在放大鏡下，釉層裡浮現出了一個鳳凰印記！等等，鳳凰的嘴巴指向東北方（NE）！」";
                    checkGameStatus();
                }
            } else {
                phoenixMark.style.opacity = 0;
            }
        }

        // 3. 右側：羅盤旋轉邏輯
        function rotateCompass() {
            if (!isMarkRevealed) {
                dialog.innerText = "【林言】：「現在瞎轉羅盤沒有用，我還不知道具體的方位指引。」";
                return;
            }

            // 每次點擊旋轉 45 度
            compassAngle += 45;
            document.getElementById('compass').style.transform = `rotate(${compassAngle}deg)`;

            // 45 度 或 405 度 等等（代表指向東北方 NE）
            if ((compassAngle % 360) === 45) {
                isCompassCorrect = true;
                dialog.innerText = "【林言】：「就是這個方向！羅盤與鳳凰印記共鳴了！」";
                document.getElementById('secret-poi').style.display = 'block';
            } else {
                isCompassCorrect = false;
                document.getElementById('secret-poi').style.display = 'none';
            }
            checkGameStatus();
        }

        // 核心狀態檢查：是否達成通關條件
        function checkGameStatus() {
            if (isLayerSelected && isMarkRevealed && isCompassCorrect) {
                document.getElementById('win-banner').style.display = 'block';
                dialog.innerText = "【系統】突破成功！隱藏在耳環釉層中的秘密坐標已與古地圖重合，『御窯廠暗道』正式解鎖！";
            }
        }
    </script>
</body>
</html>
