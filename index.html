<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>视频静音+BGM独立控制+永久循环</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
            height: 100vh; 
            height: -webkit-fill-available;
        }
        
        /* ========== 视频自适应核心修改 ========== */
        video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; 
            z-index: 1;
            opacity: 0;
            transition: opacity 1.2s ease-out;
        }
        video.show { opacity: 1; }

        /* ========== 按钮：增加安全区域适配（刘海屏） ========== */
        #bgmBtn {
            position: fixed;
            top: calc(20px + env(safe-area-inset-top)); 
            left: calc(20px + env(safe-area-inset-left));
            z-index: 9999;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px; 
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        #bgmBtn:hover { 
            background: rgba(255,255,255,0.4);
            transform: scale(1.05); 
        }

        /* ========== 文字：完美弹性居中布局 ========== */
        #tipText {
            position: fixed;
            bottom: calc(60px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            color: #fff;
            font-size: calc(18px + 0.5vw); 
            letter-spacing: 2px;
            white-space: nowrap; 
            opacity: 0;
            pointer-events: none;
            cursor: pointer;
            transition: opacity 0.3s ease-out;
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }
        #tipText.show { 
            opacity: 1; 
            pointer-events: auto;
            animation: flicker 1.2s ease-in-out infinite alternate;
        }

        @keyframes flicker { 
            0% { opacity: 1; } 
            100% { opacity: 0.4; } 
        }

        /* 隐藏BGM控件，页面整洁 */
        #bgm { display: none; }
    </style>
</head>
<body>
    <button id="bgmBtn">🔊 開啟BGM</button>
    <div id="tipText">點擊開始遊戲</div>
    
    <video 
        id="video1" 
        src="https://game-reource1.oss-cn-shenzhen.aliyuncs.com/%E8%A7%86%E9%A2%911.mp4" 
        autoplay 
        muted 
        playsinline 
        webkit-playsinline 
        x5-video-player-type="h5-page"
        oncanplay="this.classList.add('show')">
    </video>

    <audio 
        id="bgm" 
        src="https://game-reource1.oss-cn-shenzhen.aliyuncs.com/1.mp3" 
        loop 
        muted 
        preload="auto">
    </audio>

    <script>
        const video1 = document.getElementById('video1');
        const bgmBtn = document.getElementById('bgmBtn');
        const tipText = document.getElementById('tipText');
        const bgm = document.getElementById('bgm');
        const TARGET_PAUSE_TIME = 7.12; 
        let isPausedAtTarget = false;
        
        // BGM 默认设为静音状态（true）
        let isBgmMuted = true; 
        let hasUserInteracted = false; 

        // ========== 核心：BGM独立控制逻辑 ==========
        bgmBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            
            hasUserInteracted = true; 
            isBgmMuted = !isBgmMuted;
            bgm.muted = isBgmMuted;
            bgmBtn.innerHTML = isBgmMuted ? '🔊 開啟BGM' : '🔇 關閉BGM';
            
            if(isBgmMuted) {
                bgm.pause();
            } else {
                bgm.play().catch(() => {}); 
            }
        });

        // ========== 视频核心功能：7.12秒精准暂停 ==========
        video1.addEventListener('timeupdate', function() {
            if(!isPausedAtTarget && !video1.paused && video1.currentTime >= TARGET_PAUSE_TIME){
                video1.pause();
                video1.currentTime = TARGET_PAUSE_TIME; 
                isPausedAtTarget = true;
                tipText.classList.add('show'); 
                this.removeEventListener('timeupdate', arguments.callee);
            }
        });

        // ========== 点击文字继续播放视频 + 触发BGM ==========
        tipText.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if(isPausedAtTarget){
                tipText.classList.remove('show');
                video1.play(); 
                
                if(!isBgmMuted && bgm.paused) {
                    bgm.play().catch(()=>{});
                }
                isPausedAtTarget = false;
            }
        });

        // ========== 视频播放完毕自动跳转1.html ==========
        video1.addEventListener('ended', () => {
            window.location.href = "1.html";
        });

        // ========== 页面加载后的逻辑 ==========
        window.addEventListener('load', () => {
            bgm.volume = 1; 
            bgm.play().catch(()=>{}); 
        });
    </script>
</body>
</html>
