<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
        }
        /* 全螢幕遮罩層：引導使用者點擊以解鎖音訊與鏡頭 */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        #start-btn:active {
            background: #0056b3;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 10px;">MindAR 互動體驗</h2>
        <p style="margin-bottom: 25px; color: #ccc; font-size: 14px;">請點擊下方按鈕以允許開啟鏡頭與音訊</p>
        <button id="start-btn">開啟 AR 體驗</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;
                      autoStart: false;
                      filterMinCF: 0.001;
                      filterBeta: 0.01;
                      missTolerance: 10;
                      warmupTolerance: 10"
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="mp4Video" src="./1.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
        </a-assets>

        <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
        <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <a-video 
                src="#mp4Video" 
                width="1" 
                height="0.5625" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector('#mp4Video');
        const startBtn = document.querySelector('#start-btn');
        const startOverlay = document.querySelector('#start-overlay');

        // 當使用者點擊「開啟 AR 體驗」按鈕時觸發
        startBtn.addEventListener('click', function() {
            // 1. 【核心黑魔法】在使用者觸發的事件中模擬播放並立即暫停，從而騙過瀏覽器，解除靜音限制
            video.play().then(() => {
                video.pause();
                video.currentTime = 0; // 進度條歸零準備正式播放
            }).catch(err => {
                console.log("影片權限解除失敗:", err);
            });

            // 2. 隱藏全螢幕遮罩層
            startOverlay.classList.add('hidden');

            // 3. 正式啟動 MindAR 鏡頭掃描
            sceneEl.systems["mindar-image-system"].start(); 
        });

        // 影片播放邏輯控制器組件
        AFRAME.registerComponent('video-controller', {
            init: function () {
                const el = this.el;

                // 辨識成功：播放影片
                el.addEventListener('targetFound', function () {
                    console.log("辨識成功，播放影片");
                    video.play().catch(err => {
                        console.log("播放仍被攔截，嘗試點擊螢幕任意地方播放:", err);
                        // 萬一遇到極其嚴格的瀏覽器，允許點擊螢幕任意處補救播放
                        document.body.addEventListener('click', () => { video.play(); }, { once: true });
                    });
                });

                // 目標丟失：暫停影片（節省手機效能與耗電）
                el.addEventListener('targetLost', function () {
                    console.log("目標丟失，暫停影片");
                    video.pause();
                });
            }
        });

        // 針對微信內置瀏覽器的額外優化補強（如果是微信打開會自動先跑這段）
        document.addEventListener("WeixinJSBridgeReady", function () {
            video.play().then(() => { video.pause(); }).catch(e => console.log(e));
        }, false);
    </script>
</body>
</html>
