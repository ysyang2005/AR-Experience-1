<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>镜海字盘 - 第一局：字块初落 (重力控制版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body, html {
            width: 100%; height: 100%;
            background-color: #120d0a;
            font-family: 'Courier New', Courier, monospace, "Microsoft YaHei";
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 整体游戏视窗 - 保持原有经典PC大容器比例，加入全字适应响应式 */
        #game-container {
            position: relative;
            width: 1000px;
            height: 700px;
            display: flex;
            background: radial-gradient(circle, #2c1e14 0%, #0f0a07 100%);
            border: 4px solid #5a3d28;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.9);
            max-width: 100vw;
            max-height: 100vh;
        }

        /* 左侧：NPC与剧情引导区 */
        .sidebar {
            width: 350px;
            height: 100%;
            border-right: 3px solid #5a3d28;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(15, 10, 7, 0.6);
            z-index: 10;
        }

        .level-title {
            color: #8c7355;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .level-name {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* NPC 框 */
        .npc-box {
            background: rgba(44, 30, 20, 0.5);
            border: 1px solid #8c7355;
            padding: 20px;
            border-radius: 4px;
            margin-top: auto;
            margin-bottom: 20px;
        }
        .npc-name {
            color: #ff6347;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .npc-dialog {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
            min-height: 70px;
        }

        /* 目标提示 */
        .target-box {
            border-top: 1px dashed #5a3d28;
            padding-top: 20px;
        }
        .target-word {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .letter-slot {
            width: 35px;
            height: 35px;
            border: 2px dashed #5a3d28;
            color: #5a3d28;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.5s;
        }
        .letter-slot.achieved {
            border-color: #ffd700;
            color: #ffd700;
            text-shadow: 0 0 8px #ffd700;
            box-shadow: inset 0 0 8px rgba(255,215,0,0.2);
        }

        /* 右侧：复古木质字盘游戏区 */
        .game-viewport {
            position: relative;
            flex-grow: 1;
            height: 100%;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 木质活字盘框 */
        .wood-tray {
            position: relative;
            width: 450px;
            height: 600px;
            background: #231610;
            border: 16px solid #3d251a;
            border-image: linear-gradient(to bottom, #4e3022, #2d1b13) 16;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 0.1s ease;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 顶端下一个掉落提示线 */
        .drop-indicator {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px dashed rgba(140, 115, 85, 0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #8c7355; font-size: 11px; gap: 2px;
        }

        /* 金币计数器 */
        .token-counter {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffd700;
            font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 10px rgba(255,215,0,0.2);
            z-index: 100;
        }

        /* 移动端重力仪授权遮罩层 */
        #auth-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 10, 7, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center;
        }
        .auth-btn {
            background: #ffd700; color: #120d0a; border: none; padding: 15px 35px;
            font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); margin-top: 30px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2 style="color: #ffd700; margin-bottom: 15px; font-family: serif; letter-spacing: 2px;">【观测者终端同步】</h2>
        <p style="color: #8c7355; font-size: 15px; line-height: 1.6; max-width: 500px;">
            本局将接入移动设备重力感应器。<br>
            左右**倾斜手机**控制字块轨迹，用力**摇晃手机**可震开卡死的杂乱字块。
        </p>
        <button class="auth-btn" onclick="initSensors()">同步重力仪</button>
    </div>

    <div id="game-container">
        <div class="token-counter">
            🪙 Tokens: <span id="token-count">0</span>
        </div>

        <div class="sidebar">
            <div>
                <div class="level-title">教学关卡 1/3</div>
                <div class="level-name">第一局 · 字块初落</div>
            </div>

            <div class="npc-box">
                <div class="npc-name">黑市典当行老板</div>
                <div class="npc-dialog" id="npc-text">……</div>
            </div>

            <div class="target-box">
                <div class="level-title">当前需要锚定的词汇：</div>
                <div class="target-word">
                    <div class="letter-slot" id="slot-M">M</div>
                    <div class="letter-slot" id="slot-A">A</div>
                    <div class="letter-slot" id="slot-C">C</div>
                    <div class="letter-slot" id="slot-A2">A</div>
                    <div class="letter-slot" id="slot-U">U</div>
                </div>
            </div>
        </div>

        <div class="game-viewport">
            <div class="wood-tray" id="tray-element">
                <div class="drop-indicator">
                    <span id="sensor-status">📱 倾斜手机控制平移 | 每 2.5 秒自动掉落</span>
                    <span id="shake-status" style="color: #ff6347; font-weight: bold; display: none;">[检测到设备摇晃！]</span>
                </div>
                <canvas id="gameCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const trayElement = document.getElementById('tray-element');

        // 设置Canvas基础分辨率
        const WIDTH = 418;
        const HEIGHT = 568;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // 游戏状态
        let blocks = [];
        let particles = [];
        let tokens = 0;
        let currentBlock = null;
        let gameOver = false;
        let isAttracting = false; 
        let collectedLetters = { M: false, A: false, C: false, U: false };

        // 重力操控核心参数
        let tiltX = 0; 
        let lastX = 0, lastY = 0, lastZ = 0;
        const shakeThreshold = 15; // 摇晃敏感度阈值

        const MERGE_RULES = { 'M': 'A', 'A': 'C', 'C': 'U' };
        const TEXTURE_COLORS = { 'M': '#cd7f32', 'A': '#b87333', 'C': '#a0522d', 'U': '#d4af37' }; 

        // 1. NPC 语音打字机
        const npcDialog = "“别发呆，字块要满出来了。用重力倾斜你的手机，把相同的字母撞在一起。记住，我们要拼出第一个锚定词。”";
        let npcIndex = 0;
        function typeNPC() {
            if (npcIndex < npcDialog.length) {
                document.getElementById('npc-text').innerHTML += npcDialog.charAt(npcIndex);
                npcIndex++;
                setTimeout(typeNPC, 50);
            }
        }

        // 2. 现代移动端重力传感器环境授权申请
        function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ 特有安全权限确认流程
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            activateGameControls();
                        } else {
                            alert('同步失败：未获得重力感应权限。终端将降级为自动演示。');
                            activateGameControls(); // 降级处理
                        }
                    }).catch(console.error);
            } else {
                // Android 设备或常规 PC 模拟环境
                activateGameControls();
            }
        }

        function activateGameControls() {
            document.getElementById('auth-overlay').style.display = 'none';

            // 监听手机左右翻转 (陀螺仪)
            window.addEventListener('deviceorientation', (e) => {
                if (e.gamma !== null) {
                    // gamma 处于 -90 到 90 之间，将其映射到适合物理移动的步长[-2.5, 2.5]
                    tiltX = Math.min(Math.max(e.gamma / 14, -2.5), 2.5);
                    document.getElementById('sensor-status').innerText = `📱 倾斜操控中 | 当前偏角: ${Math.round(e.gamma)}°`;
                }
            });

            // 监听手机激烈摇晃 (加速度计)
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                if (!acc) return;

                let deltaX = Math.abs(acc.x - lastX);
                let deltaY = Math.abs(acc.y - lastY);
                let deltaZ = Math.abs(acc.z - lastZ);

                // 如果在任意两个方向的加速度差超过阈值，视为玩家在摇晃木盘
                if ((deltaX > shakeThreshold && deltaY > shakeThreshold) || deltaZ > shakeThreshold + 5) {
                    triggerWoodTrayShake();
                }

                lastX = acc.x; lastY = acc.y; lastZ = acc.z;
            });

            // 启动核心机制
            typeNPC();
            spawnBlock();
            gameLoop();

            // 定时核心：因为脱离了按键，每 2.5 秒自动释放顶端准备好的字块
            setInterval(autoDropBlock, 2500);
        }

        // 3. 字块类 (整合重力风阻物理)
        class Block {
            constructor(x, letter) {
                this.x = x;
                this.y = 30;
                this.letter = letter;
                this.radius = letter === 'M' ? 22 : letter === 'A' ? 26 : letter === 'C' ? 30 : 35;
                this.vx = 0;
                this.vy = 0;
                this.isStatic = true; // 默认生成在顶端处于待命悬浮状态
                this.bounciness = 0.2;
                this.mass = this.radius;
            }

            update() {
                if (isAttracting) return; 

                if (this.isStatic) {
                    // 1. 待命状态：跟随设备重力加速度左右平移
                    this.x += tiltX * 2.2;
                    // 挡墙保护
                    if (this.x - this.radius < 0) this.x = this.radius;
                    if (this.x + this.radius > WIDTH) this.x = WIDTH - this.radius;
                } else {
                    // 2. 自由落体状态：不仅受重力，还会被设备的倾斜角度横向推撞
                    this.vy += 0.3;
                    this.vx += tiltX * 0.12; // 设备倾斜会化为空气推力影响轨迹
                    this.vx *= 0.98; // 空气摩擦

                    this.x += this.vx;
                    this.y += this.vy;

                    // 边界碰撞（左右墙）
                    if (this.x - this.radius < 0) {
                        this.x = this.radius;
                        this.vx *= -this.bounciness;
                    }
                    if (this.x + this.radius > WIDTH) {
                        this.x = WIDTH - this.radius;
                        this.vx *= -this.bounciness;
                    }

                    // 触底碰撞
                    if (this.y + this.radius > HEIGHT) {
                        this.y = HEIGHT - this.radius;
                        this.vy *= -this.bounciness;
                        this.vx *= 0.8; 
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                let grad = ctx.createRadialGradient(0, 0, this.radius*0.2, 0, 0, this.radius);
                grad.addColorStop(0, '#ebd5b3');
                grad.addColorStop(0.8, TEXTURE_COLORS[this.letter] || '#5a3d28');
                grad.addColorStop(1, '#1a100a');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#3d251a';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius - 3, Math.PI, Math.PI*2);
                ctx.stroke();

                ctx.fillStyle = '#0f0a07';
                ctx.font = `bold ${this.radius * 1.1}px "Georgia", serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.letter, 1, 1);
                ctx.fillStyle = '#ffffff';
                if(this.letter === 'U') ctx.fillStyle = '#ffd700'; 
                ctx.fillText(this.letter, 0, 0);

                ctx.restore();
            }
        }

        // 4. 粒子特效系统
        class Particle {
            constructor(x, y, color, isGold = false) {
                this.x = x; this.y = y;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * (isGold ? 8 : 4) + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.isGold = isGold;
                this.radius = isGold ? Math.random() * 4 + 3 : Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.isGold) this.vy += 0.1;
                this.alpha -= 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fill();
                if(this.isGold) {
                    ctx.strokeStyle = '#b87333';
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        function spawnBlock() {
            if (isAttracting || gameOver) return;
            let pool = ['M', 'M', 'M', 'A'];
            let letter = pool[Math.floor(Math.random() * pool.length)];
            currentBlock = new Block(WIDTH / 2, letter);
        }

        // 自动释放函数
        function autoDropBlock() {
            if (currentBlock && currentBlock.isStatic && !isAttracting) {
                currentBlock.isStatic = false;
                currentBlock.vy = 2; // 赋予一个初始下落初速度
                blocks.push(currentBlock);
                currentBlock = null;
                
                // 短暂延时后在顶端生成下一个受控块
                setTimeout(spawnBlock, 600);
            }
        }

        // 触发物理摇晃手机效果：对盘内所有非待命字块施加随机向上的颠簸力
        function triggerWoodTrayShake() {
            if (isAttracting) return;
            
            document.getElementById('shake-status').style.display = 'inline';
            blocks.forEach(b => {
                if (!b.isStatic) {
                    b.vy -= Math.random() * 5 + 4; // 产生向上的反冲
                    b.vx += (Math.random() - 0.5) * 6; // 产生左右碎裂位移
                }
            });

            // 让外部的木盘 DOM 容器同步产生物理抖动样式
            trayElement.style.transform = `inset 0 10px 30px rgba(0,0,0,0.8) translate(${(Math.random()-0.5)*15}px, ${(Math.random()-0.5)*15}px)`;
            setTimeout(() => {
                trayElement.style.transform = 'none';
                document.getElementById('shake-status').style.display = 'none';
            }, 150);
        }

        // 5. 二维圆体物理碰撞检测与物理反应
        function handleCollisions() {
            for (let i = 0; i < blocks.length; i++) {
                for (let j = i + 1; j < blocks.length; j++) {
                    let b1 = blocks[i];
                    let b2 = blocks[j];

                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = b1.radius + b2.radius;

                    if (dist < minDist) {
                        if (b1.letter === b2.letter && MERGE_RULES[b1.letter]) {
                            let nextLetter = MERGE_RULES[b1.letter];
                            let targetX = (b1.x + b2.x) / 2;
                            let targetY = (b1.y + b2.y) / 2;

                            blocks.splice(j, 1);
                            blocks.splice(i, 1);

                            let newBlock = new Block(targetX, targetY);
                            newBlock.letter = nextLetter;
                            newBlock.isStatic = false; 
                            newBlock.radius = nextLetter === 'A' ? 26 : nextLetter === 'C' ? 30 : 35;
                            newBlock.mass = newBlock.radius;
                            newBlock.y = targetY; 
                            
                            for(let p=0; p<15; p++) particles.push(new Particle(targetX, targetY, '#ffd700'));

                            blocks.push(newBlock);
                            checkLetterAchievement(nextLetter);
                            return; 
                        }

                        let normalX = dx / dist;
                        let normalY = dy / dist;
                        let overlap = minDist - dist;
                        b1.x -= normalX * overlap * 0.5;
                        b1.y -= normalY * overlap * 0.5;

                        let kx = b1.vx - b2.vx;
                        let ky = b1.vy - b2.vy;
                        let p = 2 * (normalX * kx + normalY * ky) / (b1.mass + b2.mass);

                        b1.vx -= p * b2.mass * normalX * 0.5;
                        b1.vy -= p * b2.mass * normalY * 0.5;
                        b2.vx += p * b1.mass * normalX * 0.5;
                        b2.vy += p * b1.mass * normalY * 0.5;
                    }
                }
            }
        }

        function checkLetterAchievement(letter) {
            if(letter === 'A') {
                document.getElementById('slot-M').classList.add('achieved');
                document.getElementById('slot-A').classList.add('achieved');
                collectedLetters.M = true; collectedLetters.A = true;
            }
            if(letter === 'C') {
                document.getElementById('slot-C').classList.add('achieved');
                collectedLetters.C = true;
            }
            if(letter === 'U') {
                document.getElementById('slot-A2').classList.add('achieved');
                document.getElementById('slot-U').classList.add('achieved');
                collectedLetters.U = true;
            }

            if (collectedLetters.M && collectedLetters.A && collectedLetters.C && collectedLetters.U && !isAttracting) {
                triggerVictorySequence();
            }
        }

        // 6. 强烈物理特效：MACAU引力黑洞粉碎
        function triggerVictorySequence() {
            isAttracting = true;
            let centerPoint = { x: WIDTH / 2, y: HEIGHT / 2 };

            let attractionInterval = setInterval(() => {
                blocks.forEach((b) => {
                    let dx = centerPoint.x - b.x;
                    let dy = centerPoint.y - b.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > 10) {
                        b.x += (dx / dist) * 6;
                        b.y += (dy / dist) * 6;
                    } else {
                        for(let p=0; p<4; p++) particles.push(new Particle(b.x, b.y, '#ffd700'));
                    }
                });
                particles.push(new Particle(centerPoint.x + (Math.random()-0.5)*100, centerPoint.y + (Math.random()-0.5)*100, 'rgba(255,215,0,0.4)'));
            }, 20);

            setTimeout(() => {
                clearInterval(attractionInterval);
                blocks = []; 
                
                for(let i=0; i<100; i++) {
                    setTimeout(() => {
                        particles.push(new Particle(centerPoint.x, centerPoint.y, '#ffd700', true));
                        tokens++;
                        document.getElementById('token-count').innerText = tokens;
                    }, i * 15);
                }
            }, 2000);
        }

        // 7. 核心循环游戏轴
        function gameLoop() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // 绘制引导镭射定位线（跟随重力晃动）
            if (currentBlock && currentBlock.isStatic) {
                ctx.strokeStyle = 'rgba(140, 115, 85, 0.2)';
                ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.moveTo(currentBlock.x, 0); ctx.lineTo(currentBlock.x, HEIGHT); ctx.stroke();
                ctx.setLineDash([]);
                currentBlock.update();
                currentBlock.draw();
            }

            blocks.forEach(b => {
                b.update();
                b.draw();
            });

            handleCollisions();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
