<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬事皆桔 - 第二幕：手鍊的秘密</title>
    <style>
        :root {
            --theme-gold: #d4af37;
            --theme-orange: #ff7b00;
            --glass-bg: rgba(15, 15, 25, 0.85);
            --glass-border: rgba(212, 175, 55, 0.3);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Noto Serif TC', 'PingFang HK', serif; 
            background: #05060a; 
            color: #f5f5f7; 
        }
        
        #game-stage { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        
        /* 背景 */
        #background { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background-image: url('bg_interior.jpg'); 
            background-size: cover; 
            background-position: center; 
            filter: brightness(0.9); 
            transition: all 1.2s ease; 
            z-index: 1; 
        }
        #ambient-glow { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: 2; 
            pointer-events: none; 
            background: radial-gradient(circle at 50% 50%, rgba(255,165,0,0.15), rgba(0,0,0,0.4)); 
        }
        
        /* 對話框 */
        #dialogue-box { 
            position: absolute; 
            bottom: 5%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 900px; 
            height: 150px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            z-index: 5; 
            padding: 20px 25px; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        }
        
        #speaker-name { 
            font-size: 1.15rem; 
            font-weight: 600; 
            color: var(--theme-gold); 
            margin-bottom: 8px; 
            letter-spacing: 2px; 
        }
        
        #dialogue-text { 
            font-size: 0.98rem; 
            line-height: 1.7; 
            color: #f0f0f5; 
            letter-spacing: 1px; 
            font-weight: 300; 
            word-wrap: break-word;
        }
        
        #next-arrow { 
            position: absolute; 
            bottom: 12px; 
            right: 20px; 
            font-size: 0.8rem; 
            color: var(--theme-gold); 
            animation: float 2s infinite ease-in-out; 
        }
        
        /* 💻 【電腦端佈局】阿婆在左，手鍊在右 */
        #character-layer { 
            position: absolute; 
            bottom: 22%; 
            left: 35%; 
            transform: translateX(-50%); 
            height: 52%; 
            max-height: 500px; 
            z-index: 4; 
            pointer-events: none; 
            transition: all 0.6s ease-in-out;
        }
        #character-img { 
            height: 100%; 
            opacity: 0; 
            transform: translateY(20px); 
            transition: opacity 0.8s ease, transform 0.8s ease; 
        }
        
        #item-container { 
            position: absolute; 
            bottom: 25%; 
            left: 65%; 
            transform: translateX(-50%); 
            width: 40vw;
            max-width: 420px;
            aspect-ratio: 16 / 9; 
            z-index: 4; 
            display: none; 
            transition: all 0.6s ease-in-out;
        }
        
        #item-img { 
            width: 100%; 
            height: 100%; 
            opacity: 0; 
            transition: opacity 1s ease; 
            display: block; 
            object-fit: contain; 
        }

        /* 隱形點擊熱點 */
        .hotspot { 
            position: absolute; 
            border-radius: 50%; 
            cursor: pointer; 
            background: rgba(0, 0, 0, 0); 
            border: 1px solid transparent;
            outline: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        .hotspot:hover, .hotspot.clicked { 
            background: rgba(0, 0, 0, 0); 
            border: 1px solid transparent; 
            box-shadow: none; 
        }

        /* 熱點相對坐標比例 */
        #hotspot-tangerine { top: 66%; left: 32%; width: 13%; height: 22%; }
        #hotspot-jade { top: 63%; left: 54%; width: 11%; height: 13%; border-radius: 40%; }
        #hotspot-redbeads { top: 36%; left: 24.5%; width: 10%; height: 16%; }

        #action-btn { 
            position: absolute; 
            bottom: 30%; 
            z-index: 5; 
            padding: 12px 35px; 
            background: transparent; 
            color: var(--theme-gold); 
            border: 1px solid var(--theme-gold); 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 300; 
            letter-spacing: 4px; 
            transition: all 0.4s ease; 
        }
        #action-btn:hover { background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 15px rgba(212,175,55,0.3); }

        @keyframes float { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-4px); opacity: 1; } }

        /* 📱 【手機端（豎屏）完美適配樣式】 */
        @media (max-width: 768px) {
            /* 1. 阿婆位置往上挪移並縮小，置於畫面上半部分，騰出空間 */
            #character-layer {
                left: 50%;     
                bottom: 48%;   
                height: 38%;   
            }
            
            /* 2. 手鍊在手機端水平居中，置於阿婆下方、對話框上方，完美錯開 */
            #item-container {
                left: 50%;
                bottom: 25%;   
                width: 85vw;   /* 寬度擴大，方便手機觸摸 */
            }
            
            #dialogue-box {
                height: 135px; 
                padding: 15px 20px;
                bottom: 3%;
            }

            #action-btn {
                bottom: 25%;
            }
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap">
</head>
<body>

<div id="game-stage">
    <div id="background"></div>
    <div id="ambient-glow"></div>

    <button id="action-btn" onclick="startAct2()">步入店內</button>

    <div id="item-container">
        <img id="item-img" src="bracelet_box.png" alt="手鍊">
        
        <div id="hotspot-tangerine" class="hotspot" onclick="clickHotspot('tangerine')"></div>
        <div id="hotspot-jade" class="hotspot" onclick="clickHotspot('jade')"></div>
        <div id="hotspot-redbeads" class="hotspot" onclick="clickHotspot('redbeads')"></div>
    </div>

    <div id="character-layer"><img id="character-img" src="grandma_tea.png" alt="阿婆"></div>

    <div id="dialogue-box" onclick="nextScript()">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <div id="next-arrow">◇ 點擊聆聽</div>
    </div>
</div>

<script>
    const script = [
        { name: "敘述", text: "一跨進門，滾燙的熱茶香氣便裹挾著淡淡的檀香撲面而來，將外頭的寒雨隔絕在另一個世界。" },
        { name: "阿婆", text: "「來，孩子。先喝口熱茶，暖暖身子。」" },
        { name: "我", text: "「謝謝您……（接過茶杯，環顧四周）這裡好安靜，感覺時間都變慢了。」" },
        { name: "敘述", text: "櫃檯正中央，一束溫暖柔和的光線靜靜垂落。光影下，一個精緻的絲絨托盤裡正躺著一條流光溢彩的手鍊。" },
        { name: "我", text: "「這條手鍊……好美。上面好像有些不一樣的細節？」" },
        { name: "提示", text: "【請點擊手鍊上的 橘子、黃色珠子、紅色珠子 進行細緻觀察】" },
        // 解謎攔截點
        { name: "阿婆", text: "「呵呵，看來你觀察得很仔細。這條手鍊的每一部分，都有它在等待的緣分。」" },
        { name: "我", text: "「1300°C 淬鍊的小桔子，溫潤的黃玉珠，還有沉穩的紅瑪瑙……」" },
        { name: "阿婆", text: "「不差分毫。整條手鍊全長 18.5 厘米，不多不少，正好能完美貼合你此刻的手腕。這便是因緣。」" }
    ];

    let currentLine = 0;
    let isTyping = false;
    let puzzleMode = false;
    let clickedParts = { tangerine: false, jade: false, redbeads: false };

    function startAct2() {
        document.getElementById('action-btn').style.display = 'none';
        document.getElementById('dialogue-box').style.display = 'block';
        
        const img = document.getElementById('character-img');
        img.style.opacity = '1';
        img.style.transform = 'translateY(0)';
        
        showLine();
    }

    function showLine() {
        if(currentLine >= script.length) return;
        
        if (currentLine === 3) {
            const container = document.getElementById('item-container');
            container.style.display = 'block';
            setTimeout(() => document.getElementById('item-img').style.opacity = '1', 50);
        }
        
        if (currentLine === 6 && !checkPuzzleSolved()) {
            puzzleMode = true;
            document.getElementById('next-arrow').style.display = 'none';
            // 進入互動解謎時，將阿婆完全淡出，騰出全部視野給玩家點擊
            document.getElementById('character-img').style.opacity = '0';
            return;
        }

        const data = script[currentLine];
        document.getElementById('speaker-name').innerText = data.name;
        
        const textContainer = document.getElementById('dialogue-text');
        textContainer.innerText = "";
        let i = 0;
        isTyping = true;

        let timer = setInterval(() => {
            if (i < data.text.length) {
                textContainer.innerText += data.text.charAt(i);
                i++;
            } else {
                clearInterval(timer);
                isTyping = false;
            }
        }, 40);
    }

    function nextScript() {
        if (isTyping || puzzleMode) return; 
        currentLine++;
        if (currentLine < script.length) {
            showLine();
        } else {
            alert("【第二幕 完】 手鍊在你的手腕上散發出微光，第三幕即將開啟...");
        }
    }

    const hotspotData = {
        tangerine: "【核心吊墜：陶瓷小桔子】\n經受過 1300°C 高溫窯燒淬鍊的泥土，化為永不褪色的亮桔色。這是一份「萬事皆桔、生活回甘」的沉甸甸祝福。",
        jade: "【核心配珠：溫潤黃玉珠】\n在深邃的紅瑪瑙中，這一顆金黃色的玉珠宛如破曉的晨光。阿婆說它象徵著守護內心永不熄滅的希望與溫暖。",
        redbeads: "【主體材質：質地深邃的紅瑪瑙】\n一顆顆圓潤飽滿的紅瑪瑙環繞成圈，觸手溫涼。具有安神去躁、辟邪祈福的東方意蘊，為忙碌焦慮的都市生活帶來平靜。"
    };

    function clickHotspot(part) {
        if (!puzzleMode) return;

        clickedParts[part] = true;
        document.getElementById(`hotspot-${part}`).classList.add('clicked');

        document.getElementById('speaker-name').innerText = "觀察細節";
        const textContainer = document.getElementById('dialogue-text');
        textContainer.innerText = hotspotData[part];

        if (checkPuzzleSolved()) {
            puzzleMode = false;
            setTimeout(() => {
                // 解謎完成後，阿婆重新溫柔淡入回來
                document.getElementById('character-img').style.opacity = '1';
                document.getElementById('next-arrow').style.display = 'block';
                currentLine = 6;
                showLine();
            }, 3000); 
        }
    }

    function checkPuzzleSolved() {
        return clickedParts.tangerine && clickedParts.jade && clickedParts.redbeads;
    }
</script>
</body>
</html>
