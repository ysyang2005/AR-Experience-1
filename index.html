<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純代碼生成 - 蒸汽齒輪與調頻收音機</title>
    <style>
        :root {
            --bronze: #8c6239;
            --dark-copper: #3d2612;
            --glow-green: #39ff14;
        }

        body {
            background-color: #110d0a;
            color: #e0d5c1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.03) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .radio-container {
            border: 6px double var(--bronze);
            background: linear-gradient(145deg, #24170d, #140c06);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
            z-index: 10;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--bronze);
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 25px;
        }

        .frequency-display {
            background-color: #081205;
            border: 3px inset var(--dark-copper);
            height: 80px;
            margin-bottom: 25px;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signal-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--glow-green);
            box-shadow: 0 0 8px var(--glow-green);
            opacity: 0.7;
        }

        .noise-active .signal-line {
            animation: jitter 0.15s infinite;
        }

        .freq-text {
            color: var(--glow-green);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--glow-green);
            z-index: 2;
            letter-spacing: 3px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .knob-label {
            font-size: 0.8rem;
            color: #8a7663;
            margin-bottom: 5px;
        }

        .btn-steam {
            background: linear-gradient(to bottom, #7a5330, #4a301a);
            border: 2px solid #3d2612;
            color: #f7e6d4;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px #24160b, 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }

        .btn-steam:active {
            box-shadow: 0 1px #24160b;
            transform: translateY(3px);
        }

        .btn-steam.playing {
            background: linear-gradient(to bottom, #4a301a, #24170d);
            color: var(--glow-green);
            border-color: var(--bronze);
        }

        .status-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #8a7663;
            min-height: 40px;
            line-height: 1.4;
        }

        @keyframes jitter {
            0% { transform: translateY(-5px) scaleY(1); }
            50% { transform: translateY(8px) scaleY(2.5); }
            100% { transform: translateY(-3px) scaleY(0.5); }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="radio-container">
        <h1>RETRO STEAM RECEIVER</h1>
        
        <div class="frequency-display" id="display">
            <div class="signal-line"></div>
            <div class="freq-text" id="freqCode">00.0 MHz</div>
        </div>

        <div class="controls">
            <div>
                <div class="knob-label">黃銅閥門開關</div>
                <button class="btn-steam" id="powerBtn">啟動微波核心</button>
            </div>
        </div>

        <div class="status-text" id="statusLog">機件冰冷。等待齒輪咬合與壓力閥導通...</div>
    </div>

    <script>
        const powerBtn = document.getElementById('powerBtn');
        const display = document.getElementById('display');
        const freqCode = document.getElementById('freqCode');
        const statusLog = document.getElementById('statusLog');

        let isRunning = false;
        
        // Web Audio API 節點變數
        let audioCtx = null;
        let gearOsc = null;
        let gearGain = null;
        let noiseNode = null;
        let noiseGain = null;
        let frequencyInterval = null;

        // 初始化音訊上下文
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // 用數學算式即時生成白噪音（電流聲）
        function createWhiteNoise() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;
            noise.loop = true;
            return noise;
        }

        // 用低頻振盪器合成低沉的工業齒輪與機械轟鳴聲
        function playGearSound() {
            gearOsc = audioCtx.createOscillator();
            gearGain = audioCtx.createGain();
            
            gearOsc.type = 'sawtooth'; // 鋸齒波，帶有強烈機械摩擦質感
            gearOsc.frequency.setValueAtTime(45, audioCtx.currentTime); // 45Hz 超低空調與齒輪轟鳴
            
            // 模擬齒輪每秒 2 次的咬合撞擊起伏（低頻調變）
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.setValueAtTime(2, audioCtx.currentTime); 
            lfoGain.gain.setValueAtTime(15, audioCtx.currentTime);
            
            lfo.connect(lfoGain);
            lfoGain.connect(gearOsc.frequency);
            
            gearGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            
            gearOsc.connect(gearGain);
            gearGain.connect(audioCtx.destination);
            
            gearOsc.start();
            lfo.start();
        }

        powerBtn.addEventListener('click', () => {
            if (!isRunning) {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                isRunning = true;
                powerBtn.classList.add('playing');
                powerBtn.innerText = '關閉核心';
                display.classList.add('noise-active');
                freqCode.innerText = '87.5 MHz';
                statusLog.innerText = '耳機中響起低沉的蒸汽齒輪咬合聲...';

                // 1. 立即播放蒸汽齒輪聲
                playGearSound();

                // 2. 2.5秒後轉為電流雜音（白噪音）
                setTimeout(() => {
                    if (isRunning) {
                        noiseNode = createWhiteNoise();
                        noiseGain = audioCtx.createGain();
                        
                        // 帶通濾波器，讓白噪音聽起來更像老舊收音機的收訊不良感
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.frequency.value = 1000; 

                        noiseGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                        
                        noiseNode.connect(filter);
                        filter.connect(noiseGain);
                        noiseGain.connect(audioCtx.destination);
                        
                        noiseNode.start();
                        
                        statusLog.innerText = '隨後轉為老舊收音機的電流雜音（White Noise）。核心頻率開始飄移...';
                        animateFrequency();
                    }
                }, 2500);

            } else {
                // 停止所有生成的音訊
                isRunning = false;
                powerBtn.classList.remove('playing');
                powerBtn.innerText = '啟動微波核心';
                display.classList.remove('noise-active');
                statusLog.innerText = '閥門關閉，機械歸於寂靜。';
                freqCode.innerText = '00.0 MHz';

                if (gearOsc) { gearOsc.stop(); gearOsc.disconnect(); }
                if (noiseNode) { noiseNode.stop(); noiseNode.disconnect(); }
                clearTimeout(frequencyInterval);
            }
        });

        // 模擬調頻指針飄移效果
        function animateFrequency() {
            if (!isRunning) return;
            const randomFreq = (Math.random() * (108.0 - 87.5) + 87.5).toFixed(1);
            freqCode.innerText = randomFreq + ' MHz';
            frequencyInterval = setTimeout(animateFrequency, Math.random() * 800 + 400);
        }
    </script>
</body>
</html>
