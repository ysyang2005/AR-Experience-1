<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒸汽齒輪與調頻收音機</title>
    <style>
        :root {
            --bronze: #8c6239;
            --dark-copper: #3d2612;
            --glow-green: #39ff14;
        }

        body {
            background-color: #110d0a;
            color: #e0d5c1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.03) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .radio-container {
            border: 6px double var(--bronze);
            background: linear-gradient(145deg, #24170d, #140c06);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
            z-index: 10;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--bronze);
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 25px;
        }

        /* 綠光頻率螢幕 */
        .frequency-display {
            background-color: #081205;
            border: 3px inset var(--dark-copper);
            height: 80px;
            margin-bottom: 25px;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signal-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--glow-green);
            box-shadow: 0 0 8px var(--glow-green);
            opacity: 0.7;
        }

        .noise-active .signal-line {
            animation: jitter 0.15s infinite;
        }

        .freq-text {
            color: var(--glow-green);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--glow-green);
            z-index: 2;
            letter-spacing: 3px;
        }

        /* 蒸汽旋鈕與控制鍵 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .knob-label {
            font-size: 0.8rem;
            color: #8a7663;
            margin-bottom: 5px;
        }

        .btn-steam {
            background: linear-gradient(to bottom, #7a5330, #4a301a);
            border: 2px solid #3d2612;
            color: #f7e6d4;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px #24160b, 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }

        .btn-steam:active {
            box-shadow: 0 1px #24160b;
            transform: translateY(3px);
        }

        .btn-steam.playing {
            background: linear-gradient(to bottom, #4a301a, #24170d);
            color: var(--glow-green);
            border-color: var(--bronze);
        }

        .status-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #8a7663;
            min-height: 40px;
            line-height: 1.4;
        }

        @keyframes jitter {
            0% { transform: translateY(-5px) scaleY(1); }
            50% { transform: translateY(8px) scaleY(2); }
            100% { transform: translateY(-3px) scaleY(0.5); }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="radio-container">
        <h1>RETRO STEAM RECEIVER</h1>
        
        <!-- 頻率顯示器 -->
        <div class="frequency-display" id="display">
            <div class="signal-line"></div>
            <div class="freq-text" id="freqCode">87.5 MHz</div>
        </div>

        <!-- 控制模組 -->
        <div class="controls">
            <div>
                <div class="knob-label">黃銅閥門開關</div>
                <button class="btn-steam" id="powerBtn">啟動微波核心</button>
            </div>
        </div>

        <!-- 狀態敘述 -->
        <div class="status-text" id="statusLog">機件冰冷。等待齒輪咬合與壓力閥導通...</div>
    </div>

    <!-- 公共音效資源引用自 Pixabay 公共庫 -->
    <!-- 蒸汽/齒輪/工業背景音 -->
    <audio id="gearAudio" loop src="https://pixabay.com"></audio>
    <!-- 電流白噪音/收音機雜音 -->
    <audio id="staticAudio" loop src="https://pixabay.com"></audio>

    <script>
        const powerBtn = document.getElementById('powerBtn');
        const gearAudio = document.getElementById('gearAudio');
        const staticAudio = document.getElementById('staticAudio');
        const display = document.getElementById('display');
        const freqCode = document.getElementById('freqCode');
        const statusLog = document.getElementById('statusLog');

        let isRunning = false;

        // 設定初始音量
        gearAudio.volume = 0.6;
        staticAudio.volume = 0.4;

        powerBtn.addEventListener('click', () => {
            if (!isRunning) {
                // 啟動音效
                gearAudio.play().catch(e => console.log("等待用戶交互交互以撥放音訊"));
                
                // 模擬蒸汽運轉後切換成收音機雜音的動態
                isRunning = true;
                powerBtn.classList.add('playing');
                powerBtn.innerText = '關閉核心';
                
                statusLog.innerText = '耳機中響起低沉的蒸汽齒輪咬合聲...';
                display.classList.add('noise-active');

                // 2.5秒後轉為電流雜音
                setTimeout(() => {
                    if(isRunning) {
                        staticAudio.play();
                        statusLog.innerText = '隨後轉為老舊收音機的電流雜音（White Noise）。核心頻率開始飄移...';
                        animateFrequency();
                    }
                }, 2500);

            } else {
                // 關閉系統
                gearAudio.pause();
                staticAudio.pause();
                isRunning = false;
                powerBtn.classList.remove('playing');
                powerBtn.innerText = '啟動微波核心';
                display.classList.remove('noise-active');
                statusLog.innerText = '閥門關閉，機械歸於寂靜。';
                freqCode.innerText = '00.0 MHz';
            }
        });

        // 模擬調頻指針飄移效果
        function animateFrequency() {
            if (!isRunning) return;
            const randomFreq = (Math.random() * (108.0 - 87.5) + 87.5).toFixed(1);
            freqCode.innerText = randomFreq + ' MHz';
            setTimeout(animateFrequency, Math.random() * 800 + 400);
        }
    </script>
</body>
</html>
