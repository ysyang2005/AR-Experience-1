<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR 圖像追蹤範例</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        /* 載入中的提示畫面（選填） */
        #scanning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-family: sans-serif;
            z-index: 9999;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">正在載入 AR 相機與目標檔案...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-box position="0 0 0" scale="0.5 0.5 0.5" material="color: #4CC3D9; opacity: 0.8;"></a-box>
        </a-entity>

    </a-scene>

    <script>
        // 監聽 MindAR 載入完成的事件，隱藏載入提示
        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener("arReady", (event) => {
                console.log("MindAR 準備就緒！");
            });
        });
    </script>
</body>
</html>
