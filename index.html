<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>橘子剝皮綻放文字動畫特效</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0d10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }
        #canvasContainer {
            position: relative;
            width: 600px;
            height: 600px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="canvasContainer">
    <canvas id="animationCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('animationCanvas');
const ctx = canvas.getContext('2d');

const size = 600;
canvas.width = size * window.devicePixelRatio;
canvas.height = size * window.devicePixelRatio;
ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

// 核心控制中心（参数调节）
const centerX = size / 2;
const centerY = size / 2 + 50;
const orangeRadius = 50;

// 动画阶段状态机
let globalTime = 0;
const STAGE_GLOW = 0;      // 阶段0：散发微弱光芒 (0-120帧)
const STAGE_PEEL = 1;      // 阶段1：橘子皮一瓣瓣剥下 (121-240帧)
const STAGE_BLOOM = 2;     // 阶段2：生出花朵与小礼花 (241-360帧)
const STAGE_TEXT = 3;      // 阶段3：缓缓浮现文字 (361帧以上)
let currentStage = STAGE_GLOW;

// 粒子与花朵数据源
let particles = [];
let flowers = [];
let textAlpha = 0;
let textYOffset = 0;

// 1. 初始化花朵与粒子数据
function initBlooms() {
    // 内部核心分层小花
    for (let i = 0; i < 6; i++) {
        flowers.push({
            angle: (Math.PI * 2 / 6) * i,
            maxSize: 15 + Math.random() * 10,
            currentSize: 0,
            speed: 0.4 + Math.random() * 0.3,
            color: i % 2 === 0 ? '#fff5f5' : '#ffd3d3'
        });
    }
    // 礼花粒子
    for (let i = 0; i < 60; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1, // 带有一点上升重力
            radius: 1.5 + Math.random() * 2,
            color: `hsl(${Math.random() * 40 + 20}, 100%, 70%)`, // 金黄色、粉色系
            alpha: 1,
            decay: 0.015 + Math.random() * 0.02
        });
    }
}

// 2. 绘制上方的金属耳钩（还原图片中的悬挂感）
function drawEarringHook() {
    ctx.save();
    ctx.strokeStyle = '#d4af37'; // 金色
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 4;
    ctx.shadowColor = 'rgba(212, 175, 55, 0.3)';

    // 耳环挂钩线条
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - orangeRadius - 50);
    ctx.quadraticCurveTo(centerX + 15, centerY - orangeRadius - 70, centerX + 5, centerY - orangeRadius - 100);
    ctx.stroke();

    // 挂环连接处
    ctx.beginPath();
    ctx.arc(centerX, centerY - orangeRadius - 10, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#d4af37';
    ctx.fill();
    ctx.stroke();
    ctx.restore();
}

// 3. 核心动画循环
function animate() {
    ctx.clearRect(0, 0, size, size);
    globalTime++;

    // 判定动画进行阶段
    if (globalTime <= 120) currentStage = STAGE_GLOW;
    else if (globalTime > 120 && globalTime <= 240) currentStage = STAGE_PEEL;
    else if (globalTime > 240 && globalTime <= 340) {
        if (currentStage === STAGE_PEEL) initBlooms(); // 刚切换时初始化礼花
        currentStage = STAGE_BLOOM;
    } 
    else if (globalTime > 340) currentStage = STAGE_TEXT;

    // --- 绘制背景环境与挂钩 ---
    drawEarringHook();

    // --- 阶段0：计算并绘制橘子的微弱呼吸光芒 ---
    let glowBlur = 10 + Math.sin(globalTime * 0.05) * 6;
    
    // --- 阶段1：计算橘子皮剥下的动画进度 (0 到 1) ---
    let peelProgress = 0;
    if (currentStage >= STAGE_PEEL) {
        peelProgress = Math.min(1, (globalTime - 120) / 100);
    }

    // 绘制被剥开的橘子外皮（分成 6 瓣）
    const petalCount = 6;
    for (let i = 0; i < petalCount; i++) {
        ctx.save();
        ctx.translate(centerX, centerY);
        
        // 旋转每一瓣外皮
        const baseAngle = (Math.PI * 2 / petalCount) * i;
        ctx.rotate(baseAngle);

        // 计算剥开时的外翻位移和旋转
        let peelYOffset = peelProgress * orangeRadius * 0.9;
        let peelRot = peelProgress * Math.PI * 0.45;

        ctx.translate(0, peelYOffset);
        ctx.rotate(peelRot);

        // 设置光芒
        ctx.shadowBlur = glowBlur;
        ctx.shadowColor = '#f97316';

        // 绘制单瓣橘子皮贝塞尔曲线
        ctx.beginPath();
        ctx.moveTo(0, -orangeRadius);
        ctx.bezierCurveTo(-orangeRadius * 0.5, -orangeRadius, -orangeRadius * 0.6, 0, 0, 0);
        ctx.bezierCurveTo(orangeRadius * 0.6, 0, orangeRadius * 0.5, -orangeRadius, 0, -orangeRadius);
        
        ctx.fillStyle = '#f97316'; // 鲜亮橘色
        ctx.fill();

        // 绘制单瓣内侧的白络（加强剥开的写实感）
        ctx.beginPath();
        ctx.moveTo(0, -orangeRadius + 5);
        ctx.bezierCurveTo(-orangeRadius * 0.3, -orangeRadius + 5, -orangeRadius * 0.4, -5, 0, -5);
        ctx.fillStyle = 'rgba(255, 245, 230, 0.4)';
        ctx.fill();

        ctx.restore();
    }

    // --- 阶段2：内部核心绽放花朵与小礼花 ---
    if (currentStage >= STAGE_BLOOM) {
        // 1. 绘制绽放的内部主花卉
        flowers.forEach(f => {
            if (f.currentSize < f.maxSize) f.currentSize += f.speed;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(f.angle);
            ctx.fillStyle = f.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';

            // 绘制精细五瓣花
            for (let j = 0; j < 5; j++) {
                ctx.rotate((Math.PI * 2) / 5);
                ctx.beginPath();
                ctx.ellipse(f.currentSize, 0, f.currentSize, f.currentSize / 2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });

        // 2. 渲染喷发扩散的礼花粒子
        particles.forEach((p, idx) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.02; // 微弱重力
            p.alpha -= p.decay;

            if (p.alpha > 0) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.restore();
            }
        });
    }

    // --- 阶段3：缓缓浮现金色高雅文字 ---
    if (currentStage >= STAGE_TEXT) {
        if (textAlpha < 1) textAlpha += 0.015;     // 淡入
        if (textYOffset > -40) textYOffset -= 0.5; // 缓缓向上漂移

        ctx.save();
        ctx.globalAlpha = textAlpha;
        ctx.textAlign = 'center';
        
        // 浪漫英文字体金光特效
        ctx.font = 'bold 28px Georgia, serif';
        ctx.fillStyle = '#dfb76c';
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(223, 183, 108, 0.8)';
        
        // 绘制文字
        ctx.fillText('Tom, I Miss U', centerX, centerY - orangeRadius - 130 + textYOffset);
        ctx.restore();
    }

    requestAnimationFrame(animate);
}

// 启动动画
animate();
</script>

</body>
</html>
