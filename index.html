<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: ./2.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./3.glb"></a-asset-item>
        </a-assets>

        <!-- 加燈光 -->
        <a-light type="ambient" intensity="2" color="#ffffff"></a-light>
        <a-light type="directional" intensity="3" position="1 2 1" color="#ffffff"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                src="#avatarModel" 
                scale="0.3 0.3 0.3"
                position="0 0 0" 
                rotation="90 0 0">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => {
            console.log('✅ 圖卡辨識成功！');
        });
    </script>
</body>
</html>
