<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR 識別後完美鎖定</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #status-ui {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 8px 16px;
            border-radius: 20px; font-family: sans-serif; font-size: 14px;
            z-index: 9999; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status-ui">🔍 請對準辨識圖進行首次識別...</div>

    <a-scene 
        id="main-scene"
        mindar-image="imageTargetSrc: ./2.mind; filterMinCF: 0.0001; filterBeta: 0.01; maxTrack: 1;"
        color-space="sRGB" 
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./3.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" intensity="1.5" position="1 4 2"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            
            <a-entity id="model-wrapper">
                <a-gltf-model 
                    src="#avatarModel" 
                    scale="0.01 0.01 0.01"
                    position="0 0 0.3" 
                    rotation="90 0 0">
                </a-gltf-model>
            </a-entity>
            
        </a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#ar-target');
        const wrapperEl = document.querySelector('#model-wrapper');
        const sceneEl = document.querySelector('#main-scene');
        const statusUi = document.querySelector('#status-ui');
        
        let isLocked = false;

        targetEl.addEventListener("targetFound", () => {
            if (isLocked) return;
            
            // 1. 先抓取模型在識別成功當下的「世界坐標」與「世界旋轉角度」
            const worldPosition = new THREE.Vector3();
            const worldQuaternion = new THREE.Quaternion();
            const worldScale = new THREE.Vector3();
            
            wrapperEl.object3D.updateMatrixWorld();
            wrapperEl.object3D.matrixWorld.decompose(worldPosition, worldQuaternion, worldScale);
            
            // 2. 💡 核心修正：直接在 DOM (HTML) 層級進行節點轉移
            // 把整個 <a-entity id="model-wrapper"> 從 ar-target 內部拔出，貼到 a-scene 的根目錄下
            sceneEl.appendChild(wrapperEl);
            
            // 3. 轉移後，模型在 A-Frame 內部的本地坐標會被清空，此時立刻將剛才紀錄的世界坐標塞回給它
            // 這樣在視覺上它就會完美停留在原本的位置，絕不消失！
            wrapperEl.object3D.position.copy(worldPosition);
            wrapperEl.object3D.quaternion.copy(worldQuaternion);
            
            isLocked = true;
            statusUi.innerHTML = "🎉 識別成功！模型已永久鎖定空間。";
            statusUi.style.background = "rgba(40, 167, 69, 0.8)";
            console.log("【系統提示】HTML 節點轉移成功，模型已脫離追蹤並鎖定！");
        });

        // 雙重防護：當 MindAR 宣告遺失時，確保被搬移出來的模型依然可見
        targetEl.addEventListener("targetLost", () => {
            if (isLocked) {
                wrapperEl.setAttribute('visible', true);
            }
        });
    </script>
</body>
</html>
