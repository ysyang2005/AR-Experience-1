<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        #start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 10px;">MindAR 互動體驗</h2>
        <p style="margin-bottom: 25px; color: #ccc; font-size: 14px;">請點擊下方按鈕以允許開啟鏡頭與音訊</p>
        <button id="start-btn">開啟 AR 體驗</button>
    </div>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./1.mind;
                      autoStart: false;
                      filterMinCF: 0.001;
                      filterBeta: 0.01;
                      missTolerance: 10;
                      warmupTolerance: 10"
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets timeout="10000">
            <video id="mp4Video" 
                   src="./1.mp4" 
                   loop="true"
                   playsinline 
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
        <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <!--
                修复2：rotation="0 0 90" 修正视频旋转90度问题
                垂直视频 9:16，旋转后宽高对调：width=1.7778, height=1
                如视频方向相反，改为 rotation="0 0 -90"
            -->
            <a-video 
                src="#mp4Video" 
                width="1.7778"
                height="1"
                position="0 0 0" 
                rotation="0 0 90">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        AFRAME.registerComponent('video-controller', {
            init: function () {
                const el = this.el;
                const video = document.querySelector('#mp4Video');

                el.addEventListener('targetFound', function () {
                    console.log("辨識成功，播放影片");
                    // 取消静音（若之前降级为静音激活）
                    video.muted = false;
                    if (window._audioCtx && window._audioCtx.state === 'suspended') {
                        window._audioCtx.resume();
                    }
                    video.play().catch(err => console.log("播放被拦截:", err));
                });

                el.addEventListener('targetLost', function () {
                    console.log("目標丟失，暫停影片");
                    video.pause();
                    // 修复1：丢失目标后重置时间，防止下次识别时有残留画面
                    video.currentTime = 0;
                });
            }
        });

        const sceneEl  = document.querySelector('#ar-scene');
        const video     = document.querySelector('#mp4Video');
        const startBtn  = document.querySelector('#start-btn');
        const startOverlay = document.querySelector('#start-overlay');

        let sceneReady = false;
        sceneEl.addEventListener('loaded', () => { sceneReady = true; });

        startBtn.addEventListener('click', function () {
            // 解锁 AudioContext（必须在用户手势内）
            try {
                window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window._audioCtx.resume();
            } catch(e) { console.log("AudioContext 失败:", e); }

            // 修复1：仅做音频上下文预热，不 play 视频
            // 用一段静默音频节点触发浏览器音频解锁，视频本身保持暂停
            try {
                const silentBuffer = window._audioCtx.createBuffer(1, 1, 22050);
                const source = window._audioCtx.createBufferSource();
                source.buffer = silentBuffer;
                source.connect(window._audioCtx.destination);
                source.start(0);
            } catch(e) { console.log("静默音频触发失败:", e); }

            // 修复1：确保视频停在起点，等待识别再播
            video.pause();
            video.currentTime = 0;
            video.muted = false;

            startOverlay.classList.add('hidden');

            const tryStart = () => {
                const mindARSystem = sceneEl.systems["mindar-image-system"];
                if (mindARSystem) {
                    mindARSystem.start();
                } else {
                    setTimeout(tryStart, 300);
                }
            };

            sceneReady ? tryStart() : sceneEl.addEventListener('loaded', tryStart, { once: true });
        });

        // 微信解锁
        document.addEventListener("WeixinJSBridgeReady", function () {
            try {
                window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window._audioCtx.resume();
            } catch(e) {}
        }, false);
    </script>
</body>
</html>
