<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        #start-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #start-btn {
            padding: 14px 28px; font-size: 18px;
            background: #007bff; color: white;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold;
        }
        /* 调试信息浮层 */
        #debug-log {
            position: fixed; bottom: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: #0f0;
            font-size: 12px; font-family: monospace;
            padding: 8px; border-radius: 6px;
            z-index: 8888; max-height: 120px;
            overflow-y: auto; pointer-events: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 10px;">MindAR 互動體驗</h2>
        <p style="margin-bottom: 25px; color: #ccc; font-size: 14px;">請點擊下方按鈕以允許開啟鏡頭與音訊</p>
        <button id="start-btn">開啟 AR 體驗</button>
    </div>

    <!-- 调试浮层，确认识别状态，稳定后可删除 -->
    <div id="debug-log"></div>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./1.mind;
                      autoStart: false;
                      filterMinCF: 0.001;
                      filterBeta: 0.01;
                      missTolerance: 10;
                      warmupTolerance: 2"
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">

        <a-assets timeout="10000">
            <video id="mp4Video"
                   src="./1.mp4"
                   loop="true"
                   playsinline
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
        <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <a-video
                src="#mp4Video"
                width="1.7778"
                height="1"
                position="0 0 0"
                rotation="0 0 90">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        // 调试日志函数
        const debugEl = document.querySelector('#debug-log');
        function log(msg) {
            console.log(msg);
            const line = document.createElement('div');
            line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
            debugEl.appendChild(line);
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        AFRAME.registerComponent('video-controller', {
            init: function () {
                const el = this.el;
                const video = document.querySelector('#mp4Video');

                el.addEventListener('targetFound', function () {
                    log("✅ 識別成功，播放影片");
                    video.muted = false;
                    if (window._audioCtx && window._audioCtx.state === 'suspended') {
                        window._audioCtx.resume();
                    }
                    video.play().catch(err => log("播放被拦截: " + err));
                });

                el.addEventListener('targetLost', function () {
                    log("⚠️ 目標丟失，暫停影片");
                    video.pause();
                    video.currentTime = 0;
                });
            }
        });

        const sceneEl      = document.querySelector('#ar-scene');
        const video        = document.querySelector('#mp4Video');
        const startBtn     = document.querySelector('#start-btn');
        const startOverlay = document.querySelector('#start-overlay');

        let sceneReady = false;
        sceneEl.addEventListener('loaded', () => {
            sceneReady = true;
            log("🎬 场景加载完成");
        });

        // MindAR 就绪 / 错误事件
        sceneEl.addEventListener('arReady', () => log("📷 摄像头就绪，请对准识别图"));
        sceneEl.addEventListener('arError', (e) => log("❌ AR错误: " + JSON.stringify(e.detail)));

        startBtn.addEventListener('click', function () {
            log("👆 按钮点击，启动中...");

            try {
                window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window._audioCtx.resume();
                const silentBuffer = window._audioCtx.createBuffer(1, 1, 22050);
                const source = window._audioCtx.createBufferSource();
                source.buffer = silentBuffer;
                source.connect(window._audioCtx.destination);
                source.start(0);
                log("🔊 AudioContext 已解锁");
            } catch(e) { log("AudioContext 失败: " + e); }

            video.pause();
            video.currentTime = 0;
            video.muted = false;

            startOverlay.classList.add('hidden');

            const tryStart = () => {
                const mindARSystem = sceneEl.systems["mindar-image-system"];
                if (mindARSystem) {
                    log("🚀 MindAR 启动");
                    mindARSystem.start();
                } else {
                    log("⏳ 等待 MindAR system...");
                    setTimeout(tryStart, 300);
                }
            };

            sceneReady ? tryStart() : sceneEl.addEventListener('loaded', tryStart, { once: true });
        });

        document.addEventListener("WeixinJSBridgeReady", function () {
            try {
                window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                window._audioCtx.resume();
            } catch(e) {}
        }, false);
    </script>
</body>
</html>
