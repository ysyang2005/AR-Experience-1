<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR 完美鎖定（鏡像雙胞胎法）</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #status-ui {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 8px 16px;
            border-radius: 20px; font-family: sans-serif; font-size: 14px;
            z-index: 9999; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status-ui">🔍 請對準辨識圖進行首次識別...</div>

    <a-scene 
        id="main-scene"
        mindar-image="imageTargetSrc: ./2.mind; filterMinCF: 0.0001; filterBeta: 0.01; maxTrack: 1;"
        color-space="sRGB" 
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./3.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" intensity="1.5" position="1 4 2"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-entity id="tracking-model">
                <a-gltf-model 
                    src="#avatarModel" 
                    scale="0.01 0.01 0.01"
                    position="0 0 0.3" 
                    rotation="90 0 0">
                </a-gltf-model>
            </a-entity>
        </a-entity>

        <a-entity id="world-model" visible="false">
            <a-gltf-model 
                src="#avatarModel" 
                scale="0.01 0.01 0.01"
                position="0 0 0" 
                rotation="0 0 0">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        const targetEl = document.querySelector('#ar-target');
        const trackingModel = document.querySelector('#tracking-model');
        const worldModel = document.querySelector('#world-model');
        const statusUi = document.querySelector('#status-ui');
        
        let isLocked = false;

        targetEl.addEventListener("targetFound", () => {
            if (isLocked) return;
            
            // 延遲一小段時間確保 MindAR 的空間矩陣完全穩定
            setTimeout(() => {
                if (isLocked) return;

                // 1. 抓取追蹤模型在世界空間中的準確坐標與旋轉
                const worldPosition = new THREE.Vector3();
                const worldQuaternion = new THREE.Quaternion();
                const worldScale = new THREE.Vector3();
                
                trackingModel.object3D.updateMatrixWorld();
                trackingModel.object3D.matrixWorld.decompose(worldPosition, worldQuaternion, worldScale);
                
                // 2. 把這些世界坐標直接賦值給一直躲在世界場景中的「雙胞胎模型」
                worldModel.object3D.position.copy(worldPosition);
                worldModel.object3D.quaternion.copy(worldQuaternion);
                
                // 3. 亮起雙胞胎模型，同時隱藏原本在 MindAR 裡面的追蹤模型
                worldModel.setAttribute('visible', true);
                trackingModel.setAttribute('visible', false);
                
                // 4. 永久鎖定
                isLocked = true;
                statusUi.innerHTML = "🎉 識別成功！模型已永久鎖定空間。";
                statusUi.style.background = "rgba(40, 167, 69, 0.8)";
                console.log("【系統提示】雙胞胎模型已在世界坐標中定格解鎖！");
            }, 600); 
        });
    </script>
</body>
</html>
