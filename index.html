<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR 视频图像追踪</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        /* AR 启动前的用户交互提示层（用于解锁视频声音） */
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            cursor: pointer;
        }
        #ui-overlay h2 {
            margin-bottom: 10px;
        }
        #ui-overlay p {
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h2>点击屏幕开启 AR 体验</h2>
        <p>请允许摄像头权限，并对准识别图</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: 1.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, sortObjects: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="ar-video" src="1.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="example-target" mindar-image-target="targetIndex: 0">
            <a-video 
                src="#ar-video" 
                position="0 0 0" 
                rotation="0 0 0" 
                width="1" 
                height="1">
            </a-video>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById('ui-overlay');
            const video = document.getElementById('ar-video');
            const targetEntity = document.getElementById('example-target');

            // 1. 当用户点击遮罩层时，隐藏遮罩并静音播放一次视频（以此绕过浏览器的音频限制）
            overlay.addEventListener('click', () => {
                overlay.style.display = 'none';
                video.play().then(() => {
                    // 播放成功后立即暂停，等待图像识别成功
                    video.pause();
                }).catch(err => {
                    console.log("视频播放尝试失败:", err);
                });
            });

            // 2. 监听 MindAR 的事件：当摄像头【识别到】图片时，播放视频
            targetEntity.addEventListener("targetFound", event => {
                console.log("识别成功：播放视频");
                video.play();
            });

            // 3. 监听 MindAR 的事件：当目标【离开】镜头视线时，暂停视频
            targetEntity.addEventListener("targetLost", event => {
                console.log("目标丢失：暂停视频");
                video.pause();
            });
        });
    </script>
</body>
</html>
