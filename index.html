<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR 45度斜角優化穩定版</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./2.mind;
                      filterMinCF: 0.0001;
                      filterBeta: 0.001;
                      missTolerance: 30;
                      warmupTolerance: 3;
                      maxTrack: 1;"
        color-space="sRGB" 
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./3.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" intensity="1.5" color="#ffffff"></a-light>
        <a-light type="directional" intensity="1.5" position="1 4 2" color="#ffffff"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-entity rotation="0 0 0" position="0 0 0.3">
                
                <a-gltf-model 
                    src="#avatarModel" 
                    scale="0.01 0.01 0.01"
                    position="0 0 0" 
                    rotation="90 0 0">
                </a-gltf-model>
                
              </a-entity>
            
        </a-entity>
    </a-scene>

</body>
</html>
