<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: ./2.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="./2.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 紅色方塊測試用，確認辨識有效 -->
            <a-box color="red" scale="0.5 0.5 0.5" position="0 0 0"></a-box>

            <a-gltf-model 
                src="#avatarModel" 
                scale="0.05 0.05 0.05"
                position="0 0 0" 
                rotation="90 0 0">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => {
            console.log('✅ 圖卡辨識成功！');
        });
    </script>
</body>
</html>
