<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>釉中之秘：瓷藝迷蹤 - 序幕互動版</title>
    <style>
        :root {
            --bg-color: #120e0a;
            --panel-bg: #231a11;
            --text-color: #e6d7c3;
            --accent-color: #d4a373;
            --orange-ceramic: #e76f51;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 15px 0;
            font-size: 24px;
            letter-spacing: 2px;
        }

        /* 遊戲舞台主容器 */
        .game-container {
            width: 960px;
            height: 560px;
            background: #1a130b;
            border: 3px solid var(--accent-color);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        /* 劇情文字與對話框系統 */
        .dialog-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, rgba(10,8,5,0.95) 80%, rgba(10,8,5,0));
            padding: 30px 40px 20px 40px;
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .speaker-name {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .dialog-text {
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
            flex-grow: 1;
        }

        .click-hint {
            align-self: flex-end;
            font-size: 12px;
            color: #88735c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            50% { opacity: 0.3; }
        }

        /* 各場景視角控制 */
        .scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            background-size: cover;
            background-position: center;
        }

        .scene.active {
            display: flex;
        }

        /* 場景 1 & 2：工坊與木盒 */
        .center-interactive {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .clickable-element {
            padding: 15px 30px;
            background: rgba(44, 34, 25, 0.9);
            border: 2px solid var(--accent-color);
            color: var(--text-color);
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(212,163,115,0.2);
        }

        .clickable-element:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 25px rgba(212,163,115,0.5);
        }

        /* 模擬木盒內的黑色天鵝絨與耳環展示 */
        .box-open-view {
            width: 300px;
            height: 300px;
            background: #050505;
            border: 8px solid #3a2e2b;
            border-radius: 10px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 120px;
        }

        /* ================================================================= */
        /* 場景 4：核心解謎工作檯介面                                         */
        /* ================================================================= */
        .puzzle-interface {
            width: 100%;
            height: 100%;
            display: flex;
        }

        .panel {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3a2e23;
            background: var(--panel-bg);
        }

        .panel:last-child { border-right: none; }

        .panel-title {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: var(--accent-color);
            border-bottom: 1px solid #3a2e23;
            padding-bottom: 5px;
        }

        /* 左面板：材料書結構 */
        .layer-item {
            background: #1a130b;
            border: 1px solid #4a3826;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .layer-item:hover { border-color: var(--accent-color); }
        .layer-item.active {
            background: var(--accent-color);
            color: #120e0a;
            font-weight: bold;
        }

        /* 中面板：耳環工作區 */
        .workspace-center {
            flex: 1.3;
            background: #140f0a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .earring-art {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 35% 35%, #ff9a76, var(--orange-ceramic) 70%, #7a1d0b);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* 耳環金屬掛鉤 */
        .earring-art::before {
            content: '';
            position: absolute;
            top: -45px;
            left: 40px;
            width: 12px;
            height: 45px;
            border: 3px solid #d4af37;
            border-bottom: none;
            border-right: none;
            border-top-left-radius: 12px;
        }

        /* 隱藏的微觀標記 */
        .micro-mark {
            position: absolute;
            top: 32px;
            left: 32px;
            font-size: 22px;
            opacity: 0;
            pointer-events: none;
            color: #fff;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
            user-select: none;
        }

        /* 可拖曳放大鏡 */
        .magnifier-tool {
            width: 75px;
            height: 75px;
            border: 4px solid #d4af37;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(0px);
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: #d4af37;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .magnifier-tool::after {
            content: '';
            position: absolute;
            bottom: -12px;
            right: -12px;
            width: 5px;
            height: 22px;
            background: #d4af37;
            transform: rotate(-45deg);
        }

        /* 右面板：地圖與羅盤 */
        .map-area {
            width: 100%;
            height: 140px;
            background: #dfcfb3;
            border: 1px solid #6b553d;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            color: #2b2015;
        }
        .map-grid {
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .poi-node {
            position: absolute;
            top: 45px;
            left: 120px;
            background: #ae2012;
            color: #fff;
            padding: 3px 6px;
            font-size: 11px;
            border-radius: 3px;
            font-weight: bold;
            display: none;
            animation: flash 1s infinite;
        }
        @keyframes flash { 50% { opacity: 0.3; } }

        .compass-area {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .compass-disc {
            width: 110px;
            height: 110px;
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            position: relative;
            background: #17120c;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .compass-needle {
            width: 4px;
            height: 90px;
            background: linear-gradient(to bottom, #d62828 50%, #fff 50%);
            position: absolute;
            top: 10px;
            left: 53px;
            border-radius: 2px;
        }
        .direction-text {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
        }
        .dir-n { top: 4px; left: 51px; color: #d62828; }
        .dir-e { top: 48px; right: 6px; }
        .dir-s { bottom: 4px; left: 52px; }
        .dir-w { top: 48px; left: 6px; }

        /* 黑屏淡出效果 */
        .fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .title-card {
            color: var(--accent-color);
            font-size: 32px;
            font-family: serif;
            letter-spacing: 4px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

    <h1>《釉中之秘：瓷藝迷蹤》- 互動遊戲引擎</h1>

    <div class="game-container" id="engine-core">
        
        <div class="fade-overlay" id="fade-layer">
            <div class="title-card" id="title-card">第一章：雨夜御窯</div>
        </div>

        <div class="dialog-overlay" id="dialog-box" onclick="advanceStory()">
            <div class="speaker-name" id="speaker-name">系統提示</div>
            <p class="dialog-text" id="dialog-text">載入遊戲中...</p>
            <div class="click-hint">▼ 點擊繼續劇情</div>
        </div>

        <div class="scene active" id="scene1" style="background-color: #1a1510;">
            <div class="center-interactive" id="door-trigger" style="display: none;">
                <div class="clickable-element" onclick="triggerDoorOpen()">【動作】走向大門並開門</div>
            </div>
        </div>

        <div class="scene" id="scene2" style="background-color: #140f0a;">
            <div class="center-interactive">
                <div class="clickable-element" id="box-btn" onclick="openPackageBox()">【動作】拆封神秘木盒</div>
                <div class="box-open-view" id="box-view" style="display: none;">
                    <div class="earring-art" style="transform: scale(1.3);"></div>
                </div>
            </div>
        </div>

        <div class="scene" id="scene4">
            <div class="puzzle-interface">
                <div class="panel">
                    <div class="panel-title">📖 陶瓷材料結構書</div>
                    <div style="font-size: 11px; color: #88735c; margin-bottom: 10px;">點擊選取欲剖析的釉層：</div>
                    <div class="layer-item" onclick="selectGlazeLayer(this, 5)">第五層：保護外釉層 (Outer)</div>
                    <div class="layer-item" id="target-layer" onclick="selectGlazeLayer(this, 3)">第三層：鳳凰密釉層 (Secret)</div>
                    <div class="layer-item" onclick="selectGlazeLayer(this, 2)">第二層：基礎內釉層 (Inner)</div>
                    <div class="layer-item" onclick="selectGlazeLayer(this, 1)">第一層：高嶺土胎骨 (Body)</div>
                    <div id="layer-status" style="margin-top: 15px; font-size: 12px; color: #cda873; line-height: 1.4;"></div>
                </div>

                <div class="workspace-center" id="workspace-area">
                    <div class="earring-art" id="earring-target">
                        <div class="micro-mark" id="phoenix-icon">🦅<span style="font-size:9px; display:block; text-align:center;">NE</span></div>
                    </div>
                    <div class="magnifier-tool" id="lens-tool">微觀鏡</div>
                </div>

                <div class="panel">
                    <div class="panel-title">🗺️ 古老殘圖</div>
                    <div class="map-area">
                        <div class="map-grid"></div>
                        <div style="position: absolute; top:10px; left:10px; font-size:12px; font-weight:bold;">景德鎮古窯分佈圖</div>
                        <div class="poi-node" id="secret-path">📍 御窯廠廢棄暗道</div>
                    </div>

                    <div class="compass-area">
                        <div class="panel-title" style="width:100%; text-align:center; margin-bottom:10px;">🧭 航海羅盤</div>
                        <div class="compass-disc" id="compass-ui" onclick="rotateCompassUI()">
                            <div class="direction-text dir-n">N</div>
                            <div class="direction-text dir-e">E</div>
                            <div class="direction-text dir-s">S</div>
                            <div class="direction-text dir-w">W</div>
                            <div class="compass-needle"></div>
                        </div>
                        <div style="font-size: 10px; color: #88735c; margin-top: 5px;">點擊旋轉指針方向</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 腳本劇情文本資料庫 ---
        const storyScript = [
            { id: 0, speaker: "系統文本", text: "2026年6月4日，午夜。暴雨。", action: () => showScene('scene1') },
            { id: 1, speaker: "林言（獨白）", text: "「修復大師高嶺（爺爺）去世後的第三個月，工坊的生意大不如前。在這個快節奏的時代，已經很少有人願意花幾個月的時間，去等待一件破碎的瓷器重獲新生了。」" },
            { id: 2, speaker: "環境音效", text: "【敲門聲：咚、咚、咚！急促而沉重】" },
            { id: 3, speaker: "林言", text: "「誰會在這種大雨天深夜造訪？」", action: () => document.getElementById('door-trigger').style.display = 'flex' },
            
            // 點擊開門後切入
            { id: 4, speaker: "系統文本", text: "開門聲：吱呀—— 門外空無一人，只有一個被防水布包裹得嚴嚴實實的快遞木盒靜靜地躺在風雨中。收件人寫著你的名字。" },
            { id: 5, speaker: "系統文本", text: "切換至工作檯。你將木盒放在桌面上。", action: () => { showScene('scene2'); document.getElementById('dialog-box').style.display = 'none'; } },
            
            // 拆開木盒後切入
            { id: 6, speaker: "系統文本", text: "【木盒開啟聲、絲綢摩擦聲】木盒內鋪著厚厚的黑色天鵝絨。靜靜躺在中央的，是一對橙色的圓珠陶瓷耳環。" },
            { id: 7, speaker: "系統文本", text: "它飽滿、圓潤，在工坊昏暗的檯燈下，折射出令人屏息的高光澤感，彷彿封存了一縷落日的餘暉。" },
            { id: 8, speaker: "林言（驚嘆）", text: "「這是……瓷器？不，普通的釉料絕不可能在這種強度的光線下呈現出如此深邃、純粹的橙色。這光澤……簡真就像活著一樣。」" },
            { id: 9, speaker: "林言（分析）", text: "「這金屬耳鉤的工藝是現代的，但這兩顆陶瓷圓珠的胎體和釉色……絕對是古法燒製。等一下，木盒底部好像還有東西。」" },
            { id: 10, speaker: "系統文本", text: "你在天鵝絨墊層下發現了一張邊緣焦黑的殘缺地圖，以及一本外皮磨損嚴重的【修復日誌】。" },
            { id: 11, speaker: "林言", text: "「這地圖畫的是景德鎮周邊的古窯址？而這本筆記……天哪，這是我爺爺失蹤多年的修復日誌！」" },
            { id: 12, speaker: "日記字跡", text: "「『鳳凰鳴矣，于彼高岡。』世人皆知青瓷翠綠，卻不知在大明宣德年間，曾有一抹驚世駭俗的『鳳凰釉』。其色如烈火落日，工藝早已失傳。若你看到此日誌，說明耳環已落入你手。林言，不要尋找我，除非你能解開謎題……」" },
            { id: 13, speaker: "林言", text: "「爺爺……你到底瞞著我做了什麼？這對耳環就是解開『鳳凰釉』和您去向的鑰匙嗎？」" },
            { id: 14, speaker: "系統提示", text: "請將【落日橙陶瓷耳環】放入工作檯中央，解鎖新手引導解密模式。", action: () => startPuzzleMode() },
            
            // 謎題完成後觸發
            { id: 15, speaker: "林言", text: "「看到了！在內釉與外釉之間，有一個微雕的鳳凰標記！這是一個指向某處的指針！」", suspense: true },
            { id: 16, speaker: "系統提示", text: "【系統問題 2】：「鳥兒指向古窯，但牠的巢穴在哪裡？」請根據方向引導旋轉右側羅盤。", suspense: true },
            
            // 最終通關
            { id: 17, speaker: "系統文本", text: "【機關解鎖聲、日記本自動翻頁聲】隨著一聲清脆的咔嗒聲，爺爺的日誌解鎖了新的一頁。" },
            { id: 18, speaker: "系統文本", text: "上面赫然寫著一個地址：景德鎮御窯廠遺址，北緯 29.2°。" },
            { id: 19, speaker: "林言（眼神堅定）", text: "「鳳凰釉、神祕的包裹、還有爺爺的下落……看來，我必須親自去一趟景德鎮了。」", action: () => triggerGameEnd() }
        ];

        let currentProgress = 0;
        const dialogBox = document.getElementById('dialog-box');
        const speakerName = document.getElementById('speaker-name');
        const dialogText = document.getElementById('dialog-text');

        // 初始化遊戲
        window.onload = () => {
            renderStoryNode(0);
        };

        function renderStoryNode(index) {
            currentProgress = index;
            const node = storyScript[index];
            speakerName.innerText = node.speaker;
            dialogText.innerText = node.text;
            if (node.action) node.action();
        }

        function advanceStory() {
            // 如果當前節點是鎖定解謎狀態，點擊對話框不推進
            if (storyScript[currentProgress].suspense) return;

            let next = currentProgress + 1;
            if (next < storyScript.length) {
                renderStoryNode(next);
            }
        }

        function showScene(sceneId) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(sceneId).classList.add('active');
        }

        // --- 場景互動動作 ---
        function triggerDoorOpen() {
            document.getElementById('door-trigger').style.display = 'none';
            renderStoryNode(4); // 推進至開門文本
        }

        function openPackageBox() {
            document.getElementById('box-btn').style.display = 'none';
            document.getElementById('box-view').style.display = 'flex';
            dialogBox.style.display = 'flex';
            renderStoryNode(6); // 推進至看到耳環文本
        }

        // --- 解謎核心變數與邏輯 ---
        let isGlazeTargetSelected = false;
        let isMarkRevealed = false;
        let compassDegrees = 0;

        function startPuzzleMode() {
            showScene('scene4');
            dialogBox.style.display = 'flex';
            speakerName.innerText = "【系統提示】";
            dialogText.innerText = "【系統問題 1】：「第三層釉中隱藏著什麼秘密？」請在左側選擇對應釉層並使用微觀鏡。";
            storyScript[14].suspense = true; // 鎖定對話
        }

        // 選擇釉層剖面
        function selectGlazeLayer(element, layerId) {
            document.querySelectorAll('.layer-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            const statusText = document.getElementById('layer-status');
            if (layerId === 3) {
                isGlazeTargetSelected = true;
                statusText.innerHTML = "🔍 <b>掃描結果：</b> 該結構層厚度與光學折射率異常。建議使用微觀鏡進行表面微距觀察。";
                if (!isMarkRevealed) {
                    dialogText.innerText = "【系統提示】：釉層結構已切換。請將畫面中央右上角的「微觀鏡」拖曳到橙色耳環中心。";
                }
            } else {
                isGlazeTargetSelected = false;
                statusText.innerHTML = "❌ <b>掃描結果：</b> 普通釉面物理結構，未發現任何刻印或夾層痕跡。";
                document.getElementById('phoenix-icon').style.opacity = 0;
            }
            checkMicroCollision();
        }

        // 放大鏡拖曳程式碼
        const lens = document.getElementById('lens-tool');
        const earring = document.getElementById('earring-target');
        const phoenixIcon = document.getElementById('phoenix-icon');
        let dragActive = false;
        let startX, startY;

        lens.addEventListener('mousedown', initDrag);
        window.addEventListener('mousemove', executeDrag);
        window.addEventListener('mouseup', terminateDrag);

        lens.addEventListener('touchstart', (e) => initDrag(e.touches[0]));
        window.addEventListener('touchmove', (e) => executeDrag(e.touches[0]));
        window.addEventListener('touchend', terminateDrag);

        function initDrag(e) {
            dragActive = true;
            lens.style.cursor = 'grabbing';
            const rect = lens.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        }

        function executeDrag(e) {
            if (!dragActive) return;
            const containerRect = document.getElementById('engine-core').getBoundingClientRect();
            let x = e.clientX - containerRect.left - startX;
            let y = e.clientY - containerRect.top - startY;

            // 限制拖曳不出遊戲邊框
            x = Math.max(0, Math.min(x, containerRect.width - 75));
            y = Math.max(0, Math.min(y, containerRect.height - 75));

            lens.style.left = x + 'px';
            lens.style.top = y + 'px';

            checkMicroCollision();
        }

        function terminateDrag() {
            dragActive = false;
            lens.style.cursor = 'grab';
        }

        // 檢查微觀鏡是否對準耳環
        function checkMicroCollision() {
            if (!isGlazeTargetSelected) {
                phoenixIcon.style.opacity = 0;
                return;
            }

            const lensRect = lens.getBoundingClientRect();
            const earRect = earring.getBoundingClientRect();

            const lensX = lensRect.left + lensRect.width/2;
            const lensY = lensRect.top + lensRect.height/2;
            const earX = earRect.left + earRect.width/2;
            const earY = earRect.top + earRect.height/2;

            const dist = Math.sqrt(Math.pow(lensX - earX, 2) + Math.pow(lensY - earY, 2));

            if (dist < 45) { // 進入碰撞半徑
                phoenixIcon.style.opacity = 1;
                if (!isMarkRevealed) {
                    isMarkRevealed = true;
                    storyScript[14].suspense = false; // 解開第一個鎖
                    renderStoryNode(15); // 觸發林言台詞
                }
            } else {
                phoenixIcon.style.opacity = 0;
            }
        }

        // 旋轉羅盤
        function rotateCompassUI() {
            if (!isMarkRevealed) return;

            compassDegrees += 45;
            document.getElementById('compass-ui').style.transform = `rotate(${compassDegrees}deg)`;

            // 當羅盤偏轉 45 度（或者 45 + 360n），代表指向東北方 (NE)
            if ((compassDegrees % 360) === 45) {
                document.getElementById('secret-path').style.display = 'block';
                storyScript[15].suspense = false;
                storyScript[16].suspense = false;
                
                // 延遲一秒切入最終通關劇情
                setTimeout(() => {
                    renderStoryNode(17);
                }, 1000);
            } else {
                document.getElementById('secret-path').style.display = 'none';
            }
        }

        // --- 結尾轉場 ---
        function triggerGameEnd() {
            dialogBox.style.display = 'none';
            const fadeLayer = document.getElementById('fade-layer');
            const titleCard = document.getElementById('title-card');
            
            fadeLayer.style.pointerEvents = 'auto';
            fadeLayer.style.opacity = 1;
            
            setTimeout(() => {
                titleCard.style.opacity = 1;
            }, 1000);
        }
    </script>
</body>
</html>
