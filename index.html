<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR I miss U - Stable Version</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./1.mind; missInterval: 1000; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-text 
                value="I miss U" 
                font="mozillavr"
                color="#FF4081" 
                align="center" 
                width="4" 
                position="0 0 0.2"
                animation="property: position; to: 0 0.05 0.2; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
            </a-text>

            <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        </a-entity>
    </a-scene>

</body>
</html>
