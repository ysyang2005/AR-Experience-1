<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000; /* 基础背景设为黑色，防止白屏晃眼 */
        }
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #start-btn {
            padding: 14px 28px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 10px;">MindAR 互動體驗</h2>
        <p style="margin-bottom: 25px; color: #ccc; font-size: 14px;">請點擊下方按鈕以允許開啟鏡頭與音訊</p>
        <button id="start-btn">開啟 AR 體驗</button>
    </div>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./targets.mind;
                      autoStart: false;
                      filterMinCF: 0.001;
                      filterBeta: 0.01;
                      missTolerance: 10;
                      warmupTolerance: 10"
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="mp4Video" src="./1.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
        </a-assets>

        <a-light type="ambient" intensity="3" color="#ffffff"></a-light>
        <a-light type="directional" intensity="2" position="0 5 0" color="#ffffff"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <a-video 
                src="#mp4Video" 
                width="1" 
                height="0.5625" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        // 在定义组件后再行注册，防止 A-Frame 找不到 target
        AFRAME.registerComponent('video-controller', {
            init: function () {
                const el = this.el;
                const video = document.querySelector('#mp4Video');

                el.addEventListener('targetFound', function () {
                    console.log("辨識成功，播放影片");
                    video.play().catch(err => {
                        console.log("播放被拦截:", err);
                    });
                });

                el.addEventListener('targetLost', function () {
                    console.log("目標丟失，暫停影片");
                    video.pause();
                });
            }
        });

        const sceneEl = document.querySelector('#ar-scene');
        const video = document.querySelector('#mp4Video');
        const startBtn = document.querySelector('#start-btn');
        const startOverlay = document.querySelector('#start-overlay');

        startBtn.addEventListener('click', function() {
            // 激活视频
            video.play().then(() => {
                video.pause();
                video.currentTime = 0;
            }).catch(err => console.log("视频激活失败:", err));

            // 隐藏遮罩
            startOverlay.classList.add('hidden');

            // 【安全启动兼容写法】防止因为版本问题找不到 system 导致白屏
            if (sceneEl.systems && sceneEl.systems["mindar-image-system"]) {
                sceneEl.systems["mindar-image-system"].start();
            } else {
                // 备用启动方案
                sceneEl.components['mindar-image'].start();
            }
        });

        // 微信特殊处理
        document.addEventListener("WeixinJSBridgeReady", function () {
            video.play().then(() => { video.pause(); }).catch(e => console.log(e));
        }, false);
    </script>
</body>
</html>
